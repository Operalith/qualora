name: Bug report
description: Report a reproducible problem in Qualora.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Qualora.

        Do not report security vulnerabilities in public issues. Follow SECURITY.md instead.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include commands, API requests, or Docker Compose steps.
      placeholder: |
        1. Run ...
        2. Call ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Docker version, Compose version, Go/Node versions if relevant.
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Redact secrets, tokens, cookies, and credentials before posting.
      render: shell
    validations:
      required: false
