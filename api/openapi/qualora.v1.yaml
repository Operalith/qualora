openapi: 3.0.3
info:
  title: Qualora Control Plane API
  version: 0.2.0-alpha
  description: API for creating QA projects, starting browser/API smoke runs, and reading structured reports.
servers:
  - url: http://localhost:8080
paths:
  /healthz:
    get:
      summary: Health check
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: ok
        "503":
          $ref: "#/components/responses/Error"
  /api/v1/projects:
    post:
      summary: Create a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
            example:
              name: Example App
              frontend_url: https://example.com
              api_base_url: ""
              openapi_url: ""
              allowed_hosts: ["example.com"]
              security_mode: passive
              destructive_actions: false
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          $ref: "#/components/responses/Error"
        "405":
          $ref: "#/components/responses/Error"
    get:
      summary: List projects
      responses:
        "200":
          description: Project list
          content:
            application/json:
              schema:
                type: object
                required: [projects]
                properties:
                  projects:
                    type: array
                    items:
                      $ref: "#/components/schemas/Project"
        "405":
          $ref: "#/components/responses/Error"
  /api/v1/projects/{project_id}:
    get:
      summary: Get a project
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      responses:
        "200":
          description: Project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/projects/{project_id}/runs:
    post:
      summary: Start a QA run
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      responses:
        "201":
          description: Created run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestRun"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
  /api/v1/runs/{run_id}:
    get:
      summary: Get a run
      parameters:
        - $ref: "#/components/parameters/RunID"
      responses:
        "200":
          description: Run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestRun"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/runs/{run_id}/report:
    get:
      summary: Get a structured run report
      parameters:
        - $ref: "#/components/parameters/RunID"
      responses:
        "200":
          description: Report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Report"
              example:
                run_id: d76f71c6-60d0-42fd-9bce-fae54ab6bef1
                project_id: 85db0da7-fd0d-44bc-ae5a-c41cd1f03d47
                status: completed
                summary:
                  total_findings: 0
                  critical: 0
                  high: 0
                  medium: 0
                  low: 0
                  info: 0
                findings: []
                evidence:
                  - id: afcf6fd9-2512-45d0-a9a5-5d9073c55981
                    type: api_observations
                    uri: inline://api-observations
                    metadata:
                      api_base_url: http://mock-api:8080/
                      openapi_url: http://mock-api:8080/openapi.json
                      checked_endpoints: 3
                      failed_endpoints: 0
                      safe_methods_only: true
                  - id: 1c56226f-98cd-4953-afd1-086d8f37e056
                    type: openapi_summary
                    uri: inline://openapi-summary
                    metadata:
                      version: 3.0.3
                      paths: 3
                      safe_operations: 2
                      skipped_unsafe_operations: 1
                metadata:
                  jobs:
                    - kind: api
                      status: completed
        "404":
          $ref: "#/components/responses/Error"
components:
  parameters:
    ProjectID:
      name: project_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RunID:
      name: run_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    CreateProjectRequest:
      type: object
      additionalProperties: false
      description: At least one of frontend_url, api_base_url, or openapi_url is required.
      required:
        - name
        - allowed_hosts
      properties:
        name:
          type: string
        frontend_url:
          type: string
          default: ""
        api_base_url:
          type: string
          default: ""
        openapi_url:
          type: string
          default: ""
        allowed_hosts:
          type: array
          minItems: 1
          items:
            type: string
        security_mode:
          type: string
          enum: [passive]
          default: passive
        destructive_actions:
          type: boolean
          default: false
          description: Must be false in v0.2.0-alpha.
        allow_private_targets:
          type: boolean
          default: false
    Project:
      type: object
      required:
        - id
        - name
        - frontend_url
        - api_base_url
        - openapi_url
        - allowed_hosts
        - security_mode
        - destructive_actions
        - allow_private_targets
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        frontend_url:
          type: string
        api_base_url:
          type: string
        openapi_url:
          type: string
        allowed_hosts:
          type: array
          items:
            type: string
        security_mode:
          type: string
          enum: [passive]
        destructive_actions:
          type: boolean
        allow_private_targets:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    TestRun:
      type: object
      required:
        - id
        - project_id
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, running, completed, failed, canceled]
        error_message:
          type: string
        page_title:
          type: string
        started_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Report:
      type: object
      required:
        - run_id
        - project_id
        - status
        - summary
        - findings
        - evidence
        - metadata
      properties:
        run_id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, running, completed, failed, canceled]
        summary:
          $ref: "#/components/schemas/ReportSummary"
        findings:
          type: array
          items:
            $ref: "#/components/schemas/Finding"
        evidence:
          type: array
          items:
            $ref: "#/components/schemas/Evidence"
        metadata:
          type: object
          additionalProperties: true
    ReportSummary:
      type: object
      required: [total_findings, critical, high, medium, low, info]
      properties:
        total_findings:
          type: integer
        critical:
          type: integer
        high:
          type: integer
        medium:
          type: integer
        low:
          type: integer
        info:
          type: integer
    Finding:
      type: object
      required:
        - id
        - title
        - severity
        - category
        - confidence
        - description
        - recommendation
        - evidence_ids
      properties:
        id:
          type: string
          format: uuid
        run_id:
          type: string
          format: uuid
        title:
          type: string
        severity:
          type: string
          enum: [critical, high, medium, low, info]
        category:
          type: string
        confidence:
          type: string
          enum: [high, medium, low]
        description:
          type: string
        recommendation:
          type: string
        evidence_ids:
          type: array
          items:
            type: string
            format: uuid
        created_at:
          type: string
          format: date-time
    Evidence:
      type: object
      required:
        - id
        - type
        - uri
        - metadata
      properties:
        id:
          type: string
          format: uuid
        run_id:
          type: string
          format: uuid
        type:
          type: string
          enum: [screenshot, browser_observations, api_observations, openapi_summary, api_request]
        uri:
          type: string
        metadata:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              example: invalid_project
            message:
              type: string
              example: frontend_url: host "localhost" is blocked by the default safety policy
