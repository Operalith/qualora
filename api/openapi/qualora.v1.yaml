    QARunRequest:
      type: object
      additionalProperties: false
      properties:
        mode:
          type: string
          enum: [safe]
          default: safe
        start_url:
          type: string
          description: Optional start URL when running a new discovery.
        credential_profile_id:
          type: string
          format: uuid
          description: Optional credential profile for deterministic authenticated discovery. Credentials are never sent to AI.
        max_pages:
          type: integer
          minimum: 1
          maximum: 100
          default: 20
        max_depth:
          type: integer
          minimum: 0
          maximum: 5
          default: 2
        max_scenarios:
          type: integer
          minimum: 1
          maximum: 30
          default: 10
        execute:
          type: boolean
          default: false
          description: When true, execute the previewed safe DSL subset after plan generation.
        use_existing_discovery_run_id:
          type: string
          format: uuid
        use_latest_discovery:
          type: boolean
          default: false
          description: Use the latest completed discovery run when available; otherwise start a new safe discovery.
        provider_id:
          type: string
          format: uuid
          description: Optional. Uses the default AI provider when omitted.
        product_context:
          type: string
          description: Optional product notes. Secrets are redacted before prompt construction.
        focus_areas:
          type: array
          items:
            type: string
            enum: [smoke, functional, negative, accessibility, performance, security-passive, authorization, api, visual, regression]
          default: [smoke, functional, regression]
        include_quality_checks:
          type: boolean
          default: false
          description: When true, run passive quality checks after discovery and include the quality report in the Safe QA report.
        quality_max_pages:
          type: integer
          minimum: 1
          maximum: 50
          default: 10
        quality_include_security:
          type: boolean
          default: true
        quality_include_accessibility:
          type: boolean
          default: true
        quality_include_performance:
          type: boolean
          default: true
    QARun:
      type: object
      required:
        - id
        - project_id
        - status
        - mode
        - summary
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [queued, running_discovery, running_quality_checks, generating_plan, previewing_execution, executing_plan, completed, failed, error]
        mode:
          type: string
          enum: [safe]
        discovery_run_id:
          type: string
          format: uuid
          nullable: true
        quality_check_run_id:
          type: string
          format: uuid
          nullable: true
        test_plan_id:
          type: string
          format: uuid
          nullable: true
        test_plan_execution_id:
          type: string
          format: uuid
          nullable: true
        credential_profile_id:
          type: string
          format: uuid
          nullable: true
        error_message:
          type: string
        summary:
          type: object
          additionalProperties: true
        started_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    QARunReport:
      type: object
      required: [run, project, findings, evidence, safety_notes, limitations, generated_at]
      properties:
        run:
          $ref: "#/components/schemas/QARun"
        project:
          $ref: "#/components/schemas/Project"
        discovery_run:
          allOf:
            - $ref: "#/components/schemas/DiscoveryRun"
          nullable: true
        discovery_summary:
          allOf:
            - $ref: "#/components/schemas/DiscoverySummary"
          nullable: true
        quality_check_run:
          allOf:
            - $ref: "#/components/schemas/QualityCheckRun"
          nullable: true
        quality_summary:
          allOf:
            - $ref: "#/components/schemas/QualityCheckSummary"
          nullable: true
        quality_results:
          type: array
          items:
            $ref: "#/components/schemas/QualityCheckResult"
        test_plan:
          allOf:
            - $ref: "#/components/schemas/TestPlan"
          nullable: true
        execution_preview:
          allOf:
            - $ref: "#/components/schemas/TestPlanExecutionPreview"
          nullable: true
        execution_report:
          allOf:
            - $ref: "#/components/schemas/TestPlanExecutionReport"
          nullable: true
        findings:
          type: array
          items:
            $ref: "#/components/schemas/Finding"
        evidence:
          type: array
          items:
            $ref: "#/components/schemas/Evidence"
        safety_notes:
          type: array
          items:
            type: string
        limitations:
          type: array
          items:
            type: string
        generated_at:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              example: invalid_project
            message:
              type: string
              example: 'frontend_url: host "localhost" is blocked by the default safety policy'
