            enum: [smoke, functional, negative, accessibility, performance, security-passive, authorization, api, visual, regression]
          default: [smoke, functional, regression]
        include_quality_checks:
          type: boolean
          default: false
          description: When true, run passive quality checks after discovery and include the quality report in the Safe QA report.
        quality_max_pages:
          type: integer
          minimum: 1
          maximum: 50
          default: 10
        quality_include_security:
          type: boolean
          default: true
        quality_include_accessibility:
          type: boolean
          default: true
        quality_include_performance:
          type: boolean
          default: true
        include_api_checks:
          type: boolean
          default: false
          description: When true, run safe OpenAPI/API smoke and lightweight contract validation as part of the Safe QA report when a parsed API spec is available.
        api_validate_contract:
          type: boolean
          default: true
        api_validate_schema:
          type: boolean
          default: true
        api_include_unauthenticated_comparison:
          type: boolean
          default: false
          description: For authenticated Safe QA API checks, include sanitized status-only unauthenticated comparison observations.
    QARun:
      type: object
      required:
        - id
        - project_id
        - status
        - mode
        - summary
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [queued, running_discovery, running_quality_checks, generating_plan, previewing_execution, executing_plan, completed, failed, error]
        mode:
