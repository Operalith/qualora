openapi: 3.0.3
info:
  title: Qualora Control Plane API
  version: 0.5.0-alpha
  description: API for creating QA projects, starting browser/API smoke runs, managing optional OpenAI-compatible AI providers, reading reports, and downloading stored evidence objects.
servers:
  - url: http://localhost:8080
paths:
  /healthz:
    get:
      summary: Health check
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: ok
        "503":
          $ref: "#/components/responses/Error"
  /api/v1/projects:
    post:
      summary: Create a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
            example:
              name: Example App
              frontend_url: https://example.com
              api_base_url: ""
              openapi_url: ""
              allowed_hosts: ["example.com"]
              security_mode: passive
              destructive_actions: false
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          $ref: "#/components/responses/Error"
        "405":
          $ref: "#/components/responses/Error"
    get:
      summary: List projects
      responses:
        "200":
          description: Project list
          content:
            application/json:
              schema:
                type: object
                required: [projects]
                properties:
                  projects:
                    type: array
                    items:
                      $ref: "#/components/schemas/Project"
        "405":
          $ref: "#/components/responses/Error"
  /api/v1/projects/{project_id}:
    get:
      summary: Get a project
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      responses:
        "200":
          description: Project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/projects/{project_id}/runs:
    get:
      summary: List runs for a project
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      responses:
        "200":
          description: Project run list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunList"
    post:
      summary: Start a QA run
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      responses:
        "201":
          description: Created run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestRun"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
  /api/v1/projects/{project_id}/browser-smoke-runs:
    post:
      summary: Start a browser smoke run
      description: Creates a run with only a browser smoke job. The project must have frontend_url configured.
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      responses:
        "201":
          description: Created browser smoke run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestRun"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
  /api/v1/runs:
    get:
      summary: List runs
      responses:
        "200":
          description: Run list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunList"
        "405":
          $ref: "#/components/responses/Error"
  /api/v1/runs/{run_id}:
    get:
      summary: Get a run
      parameters:
        - $ref: "#/components/parameters/RunID"
      responses:
        "200":
          description: Run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestRun"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/runs/{run_id}/report:
    get:
      summary: Get a structured run report
      parameters:
        - $ref: "#/components/parameters/RunID"
      responses:
        "200":
          description: Report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Report"
              example:
                run_id: d76f71c6-60d0-42fd-9bce-fae54ab6bef1
                project_id: 85db0da7-fd0d-44bc-ae5a-c41cd1f03d47
                status: completed
                summary:
                  total_findings: 0
                  critical: 0
                  high: 0
                  medium: 0
                  low: 0
                  info: 0
                findings: []
                evidence:
                  - id: 90d77c2a-7599-4e6f-8d66-d7e8fd0b7c1f
                    type: screenshot
                    uri: s3://qualora-evidence/runs/d76f71c6-60d0-42fd-9bce-fae54ab6bef1/screenshots/1720944000-screen.png
                    metadata:
                      filename: 1720944000-screen.png
                      key: runs/d76f71c6-60d0-42fd-9bce-fae54ab6bef1/screenshots/1720944000-screen.png
                      content_type: image/png
                      size_bytes: 30421
                      target_url: http://demo-web:8080/
                      final_url: http://demo-web:8080/
                      page_title: Qualora Demo Web
                      status_code: 200
                  - id: cc5616bb-2b11-4c91-8c0a-ec3c1f890dd8
                    type: browser_observations
                    uri: inline://browser-observations
                    metadata:
                      target_url: http://demo-web:8080/
                      final_url: http://demo-web:8080/
                      page_title: Qualora Demo Web
                      status_code: 200
                      body_text_length: 73
                      timed_out: false
                      console_errors: []
                      failed_requests: []
                  - id: afcf6fd9-2512-45d0-a9a5-5d9073c55981
                    type: api_observations
                    uri: inline://api-observations
                    metadata:
                      api_base_url: http://mock-api:8080/
                      openapi_url: http://mock-api:8080/openapi.json
                      checked_endpoints: 3
                      failed_endpoints: 0
                      safe_methods_only: true
                  - id: 1c56226f-98cd-4953-afd1-086d8f37e056
                    type: openapi_summary
                    uri: inline://openapi-summary
                    metadata:
                      version: 3.0.3
                      paths: 3
                      safe_operations: 2
                      skipped_unsafe_operations: 1
                metadata:
                  jobs:
                    - kind: api
                      status: completed
                ai_analysis: null
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/runs/{run_id}/report.html:
    get:
      summary: Get a self-contained HTML run report
      parameters:
        - $ref: "#/components/parameters/RunID"
      responses:
        "200":
          description: HTML report
          content:
            text/html:
              schema:
                type: string
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/runs/{run_id}/ai-analysis:
    get:
      summary: Get latest AI analysis for a run
      description: Returns null when no AI analysis has been generated. AI is optional and reports work without it.
      parameters:
        - $ref: "#/components/parameters/RunID"
      responses:
        "200":
          description: Latest AI analysis wrapper
          content:
            application/json:
              schema:
                type: object
                required: [ai_analysis]
                properties:
                  ai_analysis:
                    allOf:
                      - $ref: "#/components/schemas/AIAnalysis"
                    nullable: true
    post:
      summary: Run AI analysis for an existing run
      description: Synchronously builds a sanitized report input and sends it to the selected or default OpenAI-compatible provider.
      parameters:
        - $ref: "#/components/parameters/RunID"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AIAnalysisRequest"
      responses:
        "201":
          description: AI analysis record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIAnalysis"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/ai/providers:
    get:
      summary: List AI providers
      responses:
        "200":
          description: AI provider list
          content:
            application/json:
              schema:
                type: object
                required: [providers]
                properties:
                  providers:
                    type: array
                    items:
                      $ref: "#/components/schemas/AIProvider"
    post:
      summary: Create AI provider
      description: Stores API keys and extra headers encrypted at rest. Raw secrets are never returned.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AIProviderRequest"
      responses:
        "201":
          description: Created AI provider
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIProvider"
        "400":
          $ref: "#/components/responses/Error"
  /api/v1/ai/providers/{provider_id}:
    get:
      summary: Get AI provider
      parameters:
        - $ref: "#/components/parameters/ProviderID"
      responses:
        "200":
          description: AI provider
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIProvider"
        "404":
          $ref: "#/components/responses/Error"
    put:
      summary: Update AI provider
      parameters:
        - $ref: "#/components/parameters/ProviderID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AIProviderRequest"
      responses:
        "200":
          description: Updated AI provider
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIProvider"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    delete:
      summary: Delete AI provider
      parameters:
        - $ref: "#/components/parameters/ProviderID"
      responses:
        "200":
          description: Delete result
          content:
            application/json:
              schema:
                type: object
                required: [deleted]
                properties:
                  deleted:
                    type: boolean
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/ai/providers/{provider_id}/test:
    post:
      summary: Test AI provider connection
      description: Sends a minimal safe JSON prompt to the provider and returns a sanitized success/failure result.
      parameters:
        - $ref: "#/components/parameters/ProviderID"
      responses:
        "200":
          description: Provider test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIProviderTestResult"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/evidence/{evidence_id}:
    get:
      summary: Download a stored evidence object
      description: Serves only Qualora evidence records known to the database. Inline metadata evidence is not downloadable.
      parameters:
        - $ref: "#/components/parameters/EvidenceID"
      responses:
        "200":
          description: Evidence object
          content:
            image/png:
              schema:
                type: string
                format: binary
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          $ref: "#/components/responses/Error"
components:
  parameters:
    ProjectID:
      name: project_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RunID:
      name: run_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EvidenceID:
      name: evidence_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ProviderID:
      name: provider_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    CreateProjectRequest:
      type: object
      additionalProperties: false
      description: At least one of frontend_url, api_base_url, or openapi_url is required.
      required:
        - name
        - allowed_hosts
      properties:
        name:
          type: string
        frontend_url:
          type: string
          default: ""
        api_base_url:
          type: string
          default: ""
        openapi_url:
          type: string
          default: ""
        allowed_hosts:
          type: array
          minItems: 1
          items:
            type: string
        security_mode:
          type: string
          enum: [passive]
          default: passive
        destructive_actions:
          type: boolean
          default: false
          description: Destructive actions are still off by default for v0.5.0-alpha.
        allow_private_targets:
          type: boolean
          default: false
    Project:
      type: object
      required:
        - id
        - name
        - frontend_url
        - api_base_url
        - openapi_url
        - allowed_hosts
        - security_mode
        - destructive_actions
        - allow_private_targets
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        frontend_url:
          type: string
        api_base_url:
          type: string
        openapi_url:
          type: string
        allowed_hosts:
          type: array
          items:
            type: string
        security_mode:
          type: string
          enum: [passive]
        destructive_actions:
          type: boolean
        allow_private_targets:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    TestRun:
      type: object
      required:
        - id
        - project_id
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [queued, pending, running, completed, failed, canceled, passed, error]
        error_message:
          type: string
        page_title:
          type: string
        started_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    RunList:
      type: object
      required: [runs]
      properties:
        runs:
          type: array
          items:
            $ref: "#/components/schemas/TestRun"
    Report:
      type: object
      required:
        - run_id
        - project_id
        - status
        - summary
        - findings
        - evidence
        - metadata
        - ai_analysis
      properties:
        run_id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [queued, pending, running, completed, failed, canceled, passed, error]
        summary:
          $ref: "#/components/schemas/ReportSummary"
        findings:
          type: array
          items:
            $ref: "#/components/schemas/Finding"
        evidence:
          type: array
          items:
            $ref: "#/components/schemas/Evidence"
        metadata:
          type: object
          additionalProperties: true
        ai_analysis:
          allOf:
            - $ref: "#/components/schemas/AIAnalysis"
          nullable: true
    ReportSummary:
      type: object
      required: [total_findings, critical, high, medium, low, info]
      properties:
        total_findings:
          type: integer
        critical:
          type: integer
        high:
          type: integer
        medium:
          type: integer
        low:
          type: integer
        info:
          type: integer
    Finding:
      type: object
      required:
        - id
        - title
        - severity
        - category
        - confidence
        - description
        - recommendation
        - evidence_ids
      properties:
        id:
          type: string
          format: uuid
        run_id:
          type: string
          format: uuid
        title:
          type: string
        severity:
          type: string
          enum: [critical, high, medium, low, info]
        category:
          type: string
        confidence:
          type: string
          enum: [high, medium, low]
        description:
          type: string
        recommendation:
          type: string
        evidence_ids:
          type: array
          items:
            type: string
            format: uuid
        created_at:
          type: string
          format: date-time
    Evidence:
      type: object
      required:
        - id
        - type
        - uri
        - metadata
      properties:
        id:
          type: string
          format: uuid
        run_id:
          type: string
          format: uuid
        type:
          type: string
          enum: [screenshot, browser_observations, api_observations, openapi_summary, api_request]
        uri:
          type: string
        metadata:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
    AIProvider:
      type: object
      required:
        - id
        - name
        - preset
        - type
        - base_url
        - model
        - temperature
        - max_output_tokens
        - timeout_seconds
        - send_screenshots
        - send_html
        - send_network_bodies
        - redaction_enabled
        - is_default
        - api_key_configured
        - extra_headers_configured
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        preset:
          type: string
          enum: [openai, openrouter, ollama, custom]
        type:
          type: string
          enum: [openai-compatible]
        base_url:
          type: string
          example: https://api.openai.com/v1
        model:
          type: string
          example: gpt-4o-mini
        temperature:
          type: number
        max_output_tokens:
          type: integer
        timeout_seconds:
          type: integer
        send_screenshots:
          type: boolean
          default: false
        send_html:
          type: boolean
          default: false
        send_network_bodies:
          type: boolean
          default: false
        redaction_enabled:
          type: boolean
          default: true
        is_default:
          type: boolean
        api_key_configured:
          type: boolean
        extra_headers_configured:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    AIProviderRequest:
      type: object
      additionalProperties: false
      required:
        - name
        - type
        - base_url
        - model
      properties:
        name:
          type: string
        preset:
          type: string
          enum: [openai, openrouter, ollama, custom]
          default: custom
        type:
          type: string
          enum: [openai-compatible]
        base_url:
          type: string
        model:
          type: string
        api_key:
          type: string
          description: Stored encrypted and never returned.
        extra_headers:
          type: object
          additionalProperties:
            type: string
          description: Optional sensitive headers, stored encrypted and never returned.
        temperature:
          type: number
          default: 0.2
        max_output_tokens:
          type: integer
          default: 1200
        timeout_seconds:
          type: integer
          default: 30
        send_screenshots:
          type: boolean
          default: false
        send_html:
          type: boolean
          default: false
        send_network_bodies:
          type: boolean
          default: false
        redaction_enabled:
          type: boolean
          default: true
        is_default:
          type: boolean
          default: false
    AIProviderTestResult:
      type: object
      required: [success, provider_name, model, latency_ms]
      properties:
        success:
          type: boolean
        provider_name:
          type: string
        model:
          type: string
        latency_ms:
          type: integer
        error_message:
          type: string
    AIAnalysisRequest:
      type: object
      additionalProperties: false
      properties:
        provider_id:
          type: string
          format: uuid
          description: Optional. Uses the default provider when omitted.
    AIAnalysis:
      type: object
      required:
        - id
        - run_id
        - model
        - status
        - executive_summary
        - technical_summary
        - risk_level
        - analysis_json
        - prompt_tokens
        - completion_tokens
        - total_tokens
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        run_id:
          type: string
          format: uuid
        provider_id:
          type: string
          format: uuid
        provider_name:
          type: string
        model:
          type: string
        status:
          type: string
          enum: [queued, running, completed, failed]
        executive_summary:
          type: string
        technical_summary:
          type: string
        risk_level:
          type: string
          enum: [low, medium, high, critical, ""]
        analysis_json:
          type: object
          additionalProperties: true
        prompt_tokens:
          type: integer
        completion_tokens:
          type: integer
        total_tokens:
          type: integer
        error_message:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              example: invalid_project
            message:
              type: string
              example: frontend_url: host "localhost" is blocked by the default safety policy
