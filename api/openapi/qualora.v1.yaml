openapi: 3.0.3
info:
  title: Qualora Control Plane API
  version: 0.10.0-alpha
  description: API for creating QA projects, importing OpenAPI specs, running safe read-only API smoke tests, starting browser/API smoke runs, managing project-scoped credential profiles, running deterministic login checks and authenticated browser smoke tests, managing explicit role-aware authorization checks, managing optional OpenAI-compatible AI providers, generating reviewable AI test plans, executing approved safe test plan steps, reading reports, and downloading stored evidence objects.
servers:
  - url: http://localhost:8080
paths:
  /healthz:
    get:
      summary: Health check
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: ok
        "503":
          $ref: "#/components/responses/Error"
  /api/v1/projects:
    post:
      summary: Create a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
            example:
              name: Example App
              frontend_url: https://example.com
              api_base_url: ""
              openapi_url: ""
              allowed_hosts: ["example.com"]
              security_mode: passive
              destructive_actions: false
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          $ref: "#/components/responses/Error"
        "405":
          $ref: "#/components/responses/Error"
    get:
      summary: List projects
      responses:
        "200":
          description: Project list
          content:
            application/json:
              schema:
                type: object
                required: [projects]
                properties:
                  projects:
                    type: array
                    items:
                      $ref: "#/components/schemas/Project"
        "405":
          $ref: "#/components/responses/Error"
  /api/v1/projects/{project_id}:
    get:
      summary: Get a project
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      responses:
        "200":
          description: Project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/projects/{project_id}/runs:
    get:
      summary: List runs for a project
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      responses:
        "200":
          description: Project run list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunList"
    post:
      summary: Start a QA run
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      responses:
        "201":
          description: Created run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestRun"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
  /api/v1/projects/{project_id}/browser-smoke-runs:
    post:
      summary: Start a browser smoke run
      description: Creates a run with only a browser smoke job. The project must have frontend_url configured.
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      responses:
        "201":
          description: Created browser smoke run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestRun"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
  /api/v1/projects/{project_id}/authenticated-browser-smoke-runs:
    post:
      summary: Start an authenticated browser smoke run
      description: Creates a deterministic selector-based login job followed by one same-origin authenticated target navigation. Credentials come from a project-scoped credential profile and are never returned by API responses.
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthenticatedBrowserSmokeRequest"
      responses:
        "201":
          description: Created authenticated browser smoke run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestRun"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
  /api/v1/projects/{project_id}/credential-profiles:
    get:
      summary: List credential profiles for a project
      description: Returns safe credential profile metadata only. Raw usernames and passwords are never returned.
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      responses:
        "200":
          description: Credential profile list
          content:
            application/json:
              schema:
                type: object
                required: [credential_profiles]
                properties:
                  credential_profiles:
                    type: array
                    items:
                      $ref: "#/components/schemas/CredentialProfile"
        "404":
          $ref: "#/components/responses/Error"
    post:
      summary: Create a credential profile
      description: Stores deterministic login selectors and encrypted username/password credentials for one project. The login URL must stay inside the project's allowed host policy and frontend origin.
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CredentialProfileRequest"
      responses:
        "201":
          description: Created credential profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CredentialProfile"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/credential-profiles/{credential_profile_id}:
    get:
      summary: Get a credential profile
      description: Returns safe credential profile metadata only. Raw usernames and passwords are never returned.
      parameters:
        - $ref: "#/components/parameters/CredentialProfileID"
      responses:
        "200":
          description: Credential profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CredentialProfile"
        "404":
          $ref: "#/components/responses/Error"
    put:
      summary: Update a credential profile
      description: Updates selectors and login criteria. Omit username or password to keep the existing encrypted secret value.
      parameters:
        - $ref: "#/components/parameters/CredentialProfileID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CredentialProfileRequest"
      responses:
        "200":
          description: Updated credential profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CredentialProfile"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    delete:
      summary: Delete a credential profile
      parameters:
        - $ref: "#/components/parameters/CredentialProfileID"
      responses:
        "204":
          description: Credential profile deleted
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/credential-profiles/{credential_profile_id}/test-login:
    post:
      summary: Test a deterministic credential-profile login flow
      description: Queues a browser job that opens only the configured login URL, fills the configured selectors, clicks the configured submit selector, and checks the configured success/failure criteria.
      parameters:
        - $ref: "#/components/parameters/CredentialProfileID"
      responses:
        "201":
          description: Created login check run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestRun"
        "404":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
  /api/v1/projects/{project_id}/authorization-checks:
    get:
      summary: List authorization checks for a project
      description: Returns explicit role-aware authorization checks. Checks are user-configured and conservative; Qualora does not generate or execute arbitrary authorization attacks.
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      responses:
        "200":
          description: Authorization check list
          content:
            application/json:
              schema:
                type: object
                required: [authorization_checks]
                properties:
                  authorization_checks:
                    type: array
                    items:
                      $ref: "#/components/schemas/AuthorizationCheck"
        "404":
          $ref: "#/components/responses/Error"
    post:
      summary: Create an authorization check
      description: Creates an explicit read-only browser URL authorization check. Browser targets must stay on the project frontend origin and allowed hosts.
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthorizationCheckRequest"
      responses:
        "201":
          description: Created authorization check
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthorizationCheck"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/authorization-checks/{authorization_check_id}:
    get:
      summary: Get an authorization check
      parameters:
        - $ref: "#/components/parameters/AuthorizationCheckID"
      responses:
        "200":
          description: Authorization check
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthorizationCheck"
        "404":
          $ref: "#/components/responses/Error"
    put:
      summary: Update an authorization check
      parameters:
        - $ref: "#/components/parameters/AuthorizationCheckID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthorizationCheckRequest"
      responses:
        "200":
          description: Updated authorization check
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthorizationCheck"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    delete:
      summary: Delete an authorization check
      parameters:
        - $ref: "#/components/parameters/AuthorizationCheckID"
      responses:
        "204":
          description: Authorization check deleted
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/projects/{project_id}/authorization-check-runs:
    get:
      summary: List authorization check runs for a project
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      responses:
        "200":
          description: Authorization run list
          content:
            application/json:
              schema:
                type: object
                required: [authorization_check_runs]
                properties:
                  authorization_check_runs:
                    type: array
                    items:
                      $ref: "#/components/schemas/AuthorizationCheckRun"
        "404":
          $ref: "#/components/responses/Error"
    post:
      summary: Start an authorization check run
      description: Queues explicit browser URL authorization checks. Login is deterministic and selector-based; no crawling, payload attacks, destructive actions, or autonomous AI browser control are performed.
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthorizationCheckRunRequest"
      responses:
        "201":
          description: Created authorization check run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthorizationCheckRun"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
  /api/v1/authorization-check-runs/{authorization_check_run_id}:
    get:
      summary: Get an authorization check run
      parameters:
        - $ref: "#/components/parameters/AuthorizationCheckRunID"
      responses:
        "200":
          description: Authorization run detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthorizationCheckDetail"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/authorization-check-runs/{authorization_check_run_id}/report:
    get:
      summary: Get a structured authorization report
      parameters:
        - $ref: "#/components/parameters/AuthorizationCheckRunID"
      responses:
        "200":
          description: Authorization report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthorizationCheckReport"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/authorization-check-runs/{authorization_check_run_id}/report.html:
    get:
      summary: Get a self-contained HTML authorization report
      parameters:
        - $ref: "#/components/parameters/AuthorizationCheckRunID"
      responses:
        "200":
          description: HTML authorization report
          content:
            text/html:
              schema:
                type: string
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/projects/{project_id}/ai-test-plans:
    post:
      summary: Generate an AI-assisted test plan for a project
      description: Synchronously builds a sanitized project/run context and sends it to the selected or default OpenAI-compatible provider. Generated plans are suggestions; only explicitly approved safe DSL steps can be executed.
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AITestPlanRequest"
      responses:
        "201":
          description: AI test plan record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestPlan"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/projects/{project_id}/test-plans:
    get:
      summary: List AI test plans for a project
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      responses:
        "200":
          description: Project test plan list
          content:
            application/json:
              schema:
                type: object
                required: [test_plans]
                properties:
                  test_plans:
                    type: array
                    items:
                      $ref: "#/components/schemas/TestPlan"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/projects/{project_id}/api-specs:
    get:
      summary: List OpenAPI specs for a project
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      responses:
        "200":
          description: API spec list
          content:
            application/json:
              schema:
                type: object
                required: [api_specs]
                properties:
                  api_specs:
                    type: array
                    items:
                      $ref: "#/components/schemas/APISpec"
        "404":
          $ref: "#/components/responses/Error"
    post:
      summary: Import an OpenAPI spec
      description: Imports OpenAPI 3.x from a project-scoped URL or inline JSON/YAML. Import discovers operations only; it does not execute API requests.
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/APISpecImportRequest"
      responses:
        "201":
          description: Imported API spec detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APISpecDetail"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/api-specs/{api_spec_id}:
    get:
      summary: Get OpenAPI spec metadata and discovered operations
      parameters:
        - $ref: "#/components/parameters/APISpecID"
      responses:
        "200":
          description: API spec detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APISpecDetail"
        "404":
          $ref: "#/components/responses/Error"
    delete:
      summary: Delete an imported OpenAPI spec
      parameters:
        - $ref: "#/components/parameters/APISpecID"
      responses:
        "200":
          description: Delete result
          content:
            application/json:
              schema:
                type: object
                required: [deleted]
                properties:
                  deleted:
                    type: boolean
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/api-specs/{api_spec_id}/operations:
    get:
      summary: List discovered API operations
      parameters:
        - $ref: "#/components/parameters/APISpecID"
      responses:
        "200":
          description: Operation list
          content:
            application/json:
              schema:
                type: object
                required: [operations]
                properties:
                  operations:
                    type: array
                    items:
                      $ref: "#/components/schemas/APIOperation"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/api-specs/{api_spec_id}/api-smoke-runs:
    post:
      summary: Run safe API smoke checks
      description: Executes only imported operations classified as safe read-only operations. Mutating, authenticated, ambiguous, and unsupported operations are skipped.
      parameters:
        - $ref: "#/components/parameters/APISpecID"
      responses:
        "201":
          description: Completed API smoke run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestRun"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/runs:
    get:
      summary: List runs
      responses:
        "200":
          description: Run list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunList"
        "405":
          $ref: "#/components/responses/Error"
  /api/v1/runs/{run_id}:
    get:
      summary: Get a run
      parameters:
        - $ref: "#/components/parameters/RunID"
      responses:
        "200":
          description: Run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestRun"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/runs/{run_id}/report:
    get:
      summary: Get a structured run report
      parameters:
        - $ref: "#/components/parameters/RunID"
      responses:
        "200":
          description: Report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Report"
              example:
                run_id: d76f71c6-60d0-42fd-9bce-fae54ab6bef1
                project_id: 85db0da7-fd0d-44bc-ae5a-c41cd1f03d47
                status: completed
                summary:
                  total_findings: 0
                  critical: 0
                  high: 0
                  medium: 0
                  low: 0
                  info: 0
                findings: []
                evidence:
                  - id: 90d77c2a-7599-4e6f-8d66-d7e8fd0b7c1f
                    type: screenshot
                    uri: s3://qualora-evidence/runs/d76f71c6-60d0-42fd-9bce-fae54ab6bef1/screenshots/1720944000-screen.png
                    metadata:
                      filename: 1720944000-screen.png
                      key: runs/d76f71c6-60d0-42fd-9bce-fae54ab6bef1/screenshots/1720944000-screen.png
                      content_type: image/png
                      size_bytes: 30421
                      target_url: http://demo-web:8080/
                      final_url: http://demo-web:8080/
                      page_title: Qualora Demo Web
                      status_code: 200
                  - id: cc5616bb-2b11-4c91-8c0a-ec3c1f890dd8
                    type: browser_observations
                    uri: inline://browser-observations
                    metadata:
                      target_url: http://demo-web:8080/
                      final_url: http://demo-web:8080/
                      page_title: Qualora Demo Web
                      status_code: 200
                      body_text_length: 73
                      timed_out: false
                      console_errors: []
                      failed_requests: []
                  - id: afcf6fd9-2512-45d0-a9a5-5d9073c55981
                    type: api_observations
                    uri: inline://api-observations
                    metadata:
                      api_base_url: http://mock-api:8080/
                      openapi_url: http://mock-api:8080/openapi.json
                      checked_endpoints: 3
                      failed_endpoints: 0
                      safe_methods_only: true
                  - id: 1c56226f-98cd-4953-afd1-086d8f37e056
                    type: openapi_summary
                    uri: inline://openapi-summary
                    metadata:
                      version: 3.0.3
                      paths: 3
                      safe_operations: 2
                      skipped_unsafe_operations: 1
                metadata:
                  jobs:
                    - kind: api
                      status: completed
                ai_analysis: null
                test_plans: []
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/runs/{run_id}/report.html:
    get:
      summary: Get a self-contained HTML run report
      parameters:
        - $ref: "#/components/parameters/RunID"
      responses:
        "200":
          description: HTML report
          content:
            text/html:
              schema:
                type: string
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/runs/{run_id}/api-results:
    get:
      summary: Get API smoke check results for a run
      parameters:
        - $ref: "#/components/parameters/RunID"
      responses:
        "200":
          description: API result list
          content:
            application/json:
              schema:
                type: object
                required: [api_results]
                properties:
                  api_results:
                    type: array
                    items:
                      $ref: "#/components/schemas/APICheckResult"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/runs/{run_id}/ai-analysis:
    get:
      summary: Get latest AI analysis for a run
      description: Returns null when no AI analysis has been generated. AI is optional and reports work without it.
      parameters:
        - $ref: "#/components/parameters/RunID"
      responses:
        "200":
          description: Latest AI analysis wrapper
          content:
            application/json:
              schema:
                type: object
                required: [ai_analysis]
                properties:
                  ai_analysis:
                    allOf:
                      - $ref: "#/components/schemas/AIAnalysis"
                    nullable: true
    post:
      summary: Run AI analysis for an existing run
      description: Synchronously builds a sanitized report input and sends it to the selected or default OpenAI-compatible provider.
      parameters:
        - $ref: "#/components/parameters/RunID"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AIAnalysisRequest"
      responses:
        "201":
          description: AI analysis record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIAnalysis"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/ai/providers:
    get:
      summary: List AI providers
      responses:
        "200":
          description: AI provider list
          content:
            application/json:
              schema:
                type: object
                required: [providers]
                properties:
                  providers:
                    type: array
                    items:
                      $ref: "#/components/schemas/AIProvider"
    post:
      summary: Create AI provider
      description: Stores API keys and extra headers encrypted at rest. Raw secrets are never returned.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AIProviderRequest"
      responses:
        "201":
          description: Created AI provider
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIProvider"
        "400":
          $ref: "#/components/responses/Error"
  /api/v1/ai/providers/{provider_id}:
    get:
      summary: Get AI provider
      parameters:
        - $ref: "#/components/parameters/ProviderID"
      responses:
        "200":
          description: AI provider
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIProvider"
        "404":
          $ref: "#/components/responses/Error"
    put:
      summary: Update AI provider
      parameters:
        - $ref: "#/components/parameters/ProviderID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AIProviderRequest"
      responses:
        "200":
          description: Updated AI provider
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIProvider"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    delete:
      summary: Delete AI provider
      parameters:
        - $ref: "#/components/parameters/ProviderID"
      responses:
        "200":
          description: Delete result
          content:
            application/json:
              schema:
                type: object
                required: [deleted]
                properties:
                  deleted:
                    type: boolean
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/ai/providers/{provider_id}/test:
    post:
      summary: Test AI provider connection
      description: Sends a minimal safe JSON prompt to the provider and returns a sanitized success/failure result.
      parameters:
        - $ref: "#/components/parameters/ProviderID"
      responses:
        "200":
          description: Provider test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIProviderTestResult"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/test-plans/{test_plan_id}:
    get:
      summary: Get an AI test plan
      parameters:
        - $ref: "#/components/parameters/TestPlanID"
      responses:
        "200":
          description: AI test plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestPlan"
        "404":
          $ref: "#/components/responses/Error"
    delete:
      summary: Delete an AI test plan
      parameters:
        - $ref: "#/components/parameters/TestPlanID"
      responses:
        "200":
          description: Delete result
          content:
            application/json:
              schema:
                type: object
                required: [deleted]
                properties:
                  deleted:
                    type: boolean
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/test-plans/{test_plan_id}/export.json:
    get:
      summary: Export the normalized AI test plan JSON payload
      parameters:
        - $ref: "#/components/parameters/TestPlanID"
      responses:
        "200":
          description: Normalized test plan payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestPlanPayload"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/test-plans/{test_plan_id}/executions:
    get:
      summary: List safe executions for a test plan
      parameters:
        - $ref: "#/components/parameters/TestPlanID"
      responses:
        "200":
          description: Test plan execution list
          content:
            application/json:
              schema:
                type: object
                required: [executions]
                properties:
                  executions:
                    type: array
                    items:
                      $ref: "#/components/schemas/TestPlanExecution"
        "404":
          $ref: "#/components/responses/Error"
    post:
      summary: Preview or start an approved safe test plan execution
      description: Runs the deterministic safety mapper. With dry_run=true, returns a preview only. With dry_run=false, queues only supported safe browser DSL steps and skips unsupported, destructive, authenticated, or ambiguous steps.
      parameters:
        - $ref: "#/components/parameters/TestPlanID"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestPlanExecutionRequest"
      responses:
        "200":
          description: Dry-run execution preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestPlanExecutionPreview"
        "201":
          description: Queued execution detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestPlanExecutionDetail"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
  /api/v1/test-plan-executions/{execution_id}:
    get:
      summary: Get a safe test plan execution
      parameters:
        - $ref: "#/components/parameters/ExecutionID"
      responses:
        "200":
          description: Execution detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestPlanExecutionDetail"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/test-plan-executions/{execution_id}/report:
    get:
      summary: Get a structured safe test plan execution report
      parameters:
        - $ref: "#/components/parameters/ExecutionID"
      responses:
        "200":
          description: Execution report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestPlanExecutionReport"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/test-plan-executions/{execution_id}/report.html:
    get:
      summary: Get a self-contained HTML safe test plan execution report
      parameters:
        - $ref: "#/components/parameters/ExecutionID"
      responses:
        "200":
          description: HTML execution report
          content:
            text/html:
              schema:
                type: string
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/evidence/{evidence_id}:
    get:
      summary: Download a stored evidence object
      description: Serves only Qualora evidence records known to the database. Inline metadata evidence is not downloadable.
      parameters:
        - $ref: "#/components/parameters/EvidenceID"
      responses:
        "200":
          description: Evidence object
          content:
            image/png:
              schema:
                type: string
                format: binary
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          $ref: "#/components/responses/Error"
components:
  parameters:
    ProjectID:
      name: project_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RunID:
      name: run_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    APISpecID:
      name: api_spec_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CredentialProfileID:
      name: credential_profile_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AuthorizationCheckID:
      name: authorization_check_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AuthorizationCheckRunID:
      name: authorization_check_run_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EvidenceID:
      name: evidence_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ProviderID:
      name: provider_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TestPlanID:
      name: test_plan_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ExecutionID:
      name: execution_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    CreateProjectRequest:
      type: object
      additionalProperties: false
      description: At least one of frontend_url, api_base_url, or openapi_url is required.
      required:
        - name
        - allowed_hosts
      properties:
        name:
          type: string
        frontend_url:
          type: string
          default: ""
        api_base_url:
          type: string
          default: ""
        openapi_url:
          type: string
          default: ""
        allowed_hosts:
          type: array
          minItems: 1
          items:
            type: string
        security_mode:
          type: string
          enum: [passive]
          default: passive
        destructive_actions:
          type: boolean
          default: false
          description: Destructive actions are off by default and are not used by safe test plan execution in v0.7.0-alpha.
        allow_private_targets:
          type: boolean
          default: false
    Project:
      type: object
      required:
        - id
        - name
        - frontend_url
        - api_base_url
        - openapi_url
        - allowed_hosts
        - security_mode
        - destructive_actions
        - allow_private_targets
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        frontend_url:
          type: string
        api_base_url:
          type: string
        openapi_url:
          type: string
        allowed_hosts:
          type: array
          items:
            type: string
        security_mode:
          type: string
          enum: [passive]
        destructive_actions:
          type: boolean
        allow_private_targets:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    TestRun:
      type: object
      required:
        - id
        - project_id
        - run_type
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        run_type:
          type: string
          enum: [full, browser_smoke, api_smoke, login_check, authenticated_browser_smoke]
        api_spec_id:
          type: string
          format: uuid
          nullable: true
        credential_profile_id:
          type: string
          format: uuid
          nullable: true
        target_path:
          type: string
          example: /dashboard
        capture_screenshot:
          type: boolean
          default: false
        max_duration_seconds:
          type: integer
          default: 30
        status:
          type: string
          enum: [queued, pending, running, completed, failed, canceled, passed, error]
        error_message:
          type: string
        page_title:
          type: string
        started_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    RunList:
      type: object
      required: [runs]
      properties:
        runs:
          type: array
          items:
            $ref: "#/components/schemas/TestRun"
    CredentialProfileRequest:
      type: object
      additionalProperties: false
      required:
        - name
        - login_url
        - username_selector
        - password_selector
        - submit_selector
      properties:
        name:
          type: string
          maxLength: 120
        type:
          type: string
          enum: [username_password]
          default: username_password
        role_name:
          type: string
          description: Optional project-scoped role label used by role-aware authorization checks.
        role_description:
          type: string
        subject_label:
          type: string
        username:
          type: string
          description: Stored encrypted and never returned. Required on create; omit on update to keep the existing username secret.
        password:
          type: string
          description: Stored encrypted and never returned. Required on create; omit on update to keep the existing password secret.
        login_url:
          type: string
          description: Must be allowed by the project allowed_hosts policy and match the frontend_url origin when frontend_url is configured.
        username_selector:
          type: string
          description: Deterministic selector for the username field.
        password_selector:
          type: string
          description: Deterministic selector for the password field.
        submit_selector:
          type: string
          description: Deterministic selector for the configured login submit control.
        success_url_contains:
          type: string
          description: At least one of success_url_contains or success_text_contains is required.
        success_text_contains:
          type: string
          description: At least one of success_url_contains or success_text_contains is required.
        failure_text_contains:
          type: string
        post_login_wait_ms:
          type: integer
          minimum: 0
          maximum: 30000
          default: 0
        is_default:
          type: boolean
          default: false
    CredentialProfile:
      type: object
      required:
        - id
        - project_id
        - name
        - type
        - username_configured
        - password_configured
        - login_url
        - username_selector
        - password_selector
        - submit_selector
        - post_login_wait_ms
        - is_default
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        name:
          type: string
        type:
          type: string
          enum: [username_password]
        role_name:
          type: string
        role_description:
          type: string
        subject_label:
          type: string
        username_configured:
          type: boolean
        password_configured:
          type: boolean
        username_display_hint:
          type: string
          description: Masked display hint only, never the raw username.
        login_url:
          type: string
        username_selector:
          type: string
        password_selector:
          type: string
        submit_selector:
          type: string
        success_url_contains:
          type: string
        success_text_contains:
          type: string
        failure_text_contains:
          type: string
        post_login_wait_ms:
          type: integer
        is_default:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    AuthenticatedBrowserSmokeRequest:
      type: object
      additionalProperties: false
      properties:
        credential_profile_id:
          type: string
          format: uuid
          description: Optional. Uses the project's default credential profile when omitted.
        target_path:
          type: string
          default: /
          description: Relative same-origin path to visit after login. Absolute URLs and sensitive query parameter names are rejected.
        capture_screenshot:
          type: boolean
          default: true
        max_duration_seconds:
          type: integer
          minimum: 5
          maximum: 120
          default: 30
    AuthorizationCheckRequest:
      type: object
      additionalProperties: false
      required:
        - name
        - actor_credential_profile_id
        - expected_outcome
        - target_url
      properties:
        name:
          type: string
        description:
          type: string
        type:
          type: string
          enum: [browser_url, api_get]
          default: browser_url
        resource_label:
          type: string
        owner_credential_profile_id:
          type: string
          format: uuid
          nullable: true
        actor_credential_profile_id:
          type: string
          format: uuid
        expected_outcome:
          type: string
          enum: [allowed, denied]
        target_url:
          type: string
          description: Browser URL/path target. For browser_url checks it must stay on the project frontend origin and allowed hosts.
        success_text_contains:
          type: string
        denied_text_contains:
          type: string
        enabled:
          type: boolean
          default: true
    AuthorizationCheck:
      allOf:
        - $ref: "#/components/schemas/AuthorizationCheckRequest"
        - type: object
          required:
            - id
            - project_id
            - type
            - enabled
            - created_at
            - updated_at
          properties:
            id:
              type: string
              format: uuid
            project_id:
              type: string
              format: uuid
            api_spec_id:
              type: string
              format: uuid
              nullable: true
            api_operation_id:
              type: string
              format: uuid
              nullable: true
            method:
              type: string
            path:
              type: string
            expected_statuses:
              type: array
              items:
                type: integer
            denied_statuses:
              type: array
              items:
                type: integer
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
    AuthorizationCheckRunRequest:
      type: object
      additionalProperties: false
      properties:
        check_ids:
          type: array
          items:
            type: string
            format: uuid
        max_checks:
          type: integer
          minimum: 1
          maximum: 50
          default: 10
    AuthorizationCheckRun:
      type: object
      required:
        - id
        - project_id
        - status
        - max_checks
        - total_checks
        - passed_checks
        - failed_checks
        - skipped_checks
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [queued, running, completed, failed, error]
        check_ids:
          type: array
          items:
            type: string
            format: uuid
        max_checks:
          type: integer
        total_checks:
          type: integer
        passed_checks:
          type: integer
        failed_checks:
          type: integer
        skipped_checks:
          type: integer
        error_message:
          type: string
        started_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    AuthorizationCheckResult:
      type: object
      required:
        - id
        - run_id
        - check_id
        - status
        - expected_outcome
        - actual_outcome
        - actor_credential_profile_id
        - created_at
      properties:
        id:
          type: string
          format: uuid
        run_id:
          type: string
          format: uuid
        check_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [passed, failed, skipped, error]
        expected_outcome:
          type: string
          enum: [allowed, denied]
        actual_outcome:
          type: string
          enum: [allowed, denied, unknown]
        actor_credential_profile_id:
          type: string
          format: uuid
        actor_role_name:
          type: string
        target_url:
          type: string
        final_url:
          type: string
        http_status:
          type: integer
          nullable: true
        page_title:
          type: string
        duration_ms:
          type: integer
          nullable: true
        evidence_id:
          type: string
          format: uuid
          nullable: true
        finding_id:
          type: string
          format: uuid
          nullable: true
        skip_reason:
          type: string
        error_message:
          type: string
        created_at:
          type: string
          format: date-time
    AuthorizationCheckDetail:
      type: object
      required: [run, results]
      properties:
        run:
          $ref: "#/components/schemas/AuthorizationCheckRun"
        checks:
          type: array
          items:
            $ref: "#/components/schemas/AuthorizationCheck"
        results:
          type: array
          items:
            $ref: "#/components/schemas/AuthorizationCheckResult"
    AuthorizationCheckReport:
      type: object
      required: [run, project, checks, results, summary, findings, evidence, metadata, generated_at]
      properties:
        run:
          $ref: "#/components/schemas/AuthorizationCheckRun"
        project:
          $ref: "#/components/schemas/Project"
        checks:
          type: array
          items:
            $ref: "#/components/schemas/AuthorizationCheck"
        results:
          type: array
          items:
            $ref: "#/components/schemas/AuthorizationCheckResult"
        summary:
          $ref: "#/components/schemas/ReportSummary"
        findings:
          type: array
          items:
            $ref: "#/components/schemas/Finding"
        evidence:
          type: array
          items:
            $ref: "#/components/schemas/Evidence"
        metadata:
          type: object
          additionalProperties: true
        generated_at:
          type: string
          format: date-time
    APISpecImportRequest:
      type: object
      additionalProperties: false
      required: [name, source_type]
      properties:
        name:
          type: string
        source_type:
          type: string
          enum: [url, inline, demo]
        source_url:
          type: string
          nullable: true
        raw_spec:
          type: string
          nullable: true
          description: Inline OpenAPI JSON/YAML. Stored locally for the alpha import record.
    APISpec:
      type: object
      required:
        - id
        - project_id
        - name
        - source_type
        - operation_count
        - safe_operation_count
        - skipped_operation_count
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        name:
          type: string
        source_type:
          type: string
          enum: [url, inline, demo]
        source_url:
          type: string
        parsed_title:
          type: string
        parsed_version:
          type: string
        server_url:
          type: string
        operation_count:
          type: integer
        safe_operation_count:
          type: integer
        skipped_operation_count:
          type: integer
        status:
          type: string
          enum: [pending, parsed, invalid, error]
        error_message:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    APISpecDetail:
      type: object
      required: [spec]
      properties:
        spec:
          $ref: "#/components/schemas/APISpec"
        operations:
          type: array
          items:
            $ref: "#/components/schemas/APIOperation"
    APIOperation:
      type: object
      required:
        - id
        - api_spec_id
        - project_id
        - method
        - path
        - tags
        - expected_statuses
        - expected_content_types
        - safe_to_execute
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        api_spec_id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        method:
          type: string
          example: GET
        path:
          type: string
          example: /users/{id}
        resolved_path:
          type: string
          example: /users/1
        query_string:
          type: string
        operation_id:
          type: string
        summary:
          type: string
        description:
          type: string
        tags:
          type: array
          items:
            type: string
        expected_statuses:
          type: array
          items:
            type: string
        expected_content_types:
          type: array
          items:
            type: string
        requires_authentication:
          type: boolean
          nullable: true
        safe_to_execute:
          type: boolean
        skip_reason:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    APISmokeSummary:
      type: object
      required:
        - total_operations
        - executed_operations
        - skipped_operations
        - passed_operations
        - failed_operations
        - errored_operations
      properties:
        total_operations:
          type: integer
        executed_operations:
          type: integer
        skipped_operations:
          type: integer
        passed_operations:
          type: integer
        failed_operations:
          type: integer
        errored_operations:
          type: integer
    APICheckResult:
      type: object
      required:
        - id
        - run_id
        - api_spec_id
        - method
        - path
        - status
        - created_at
      properties:
        id:
          type: string
          format: uuid
        run_id:
          type: string
          format: uuid
        api_spec_id:
          type: string
          format: uuid
        operation_id:
          type: string
          format: uuid
          nullable: true
        method:
          type: string
        path:
          type: string
        resolved_url:
          type: string
        status:
          type: string
          enum: [passed, failed, skipped, error]
        http_status:
          type: integer
          nullable: true
        duration_ms:
          type: integer
          nullable: true
        response_content_type:
          type: string
        response_size_bytes:
          type: integer
          nullable: true
        error_message:
          type: string
        skipped_reason:
          type: string
        created_at:
          type: string
          format: date-time
    Report:
      type: object
      required:
        - run_id
        - project_id
        - run_type
        - status
        - summary
        - findings
        - evidence
        - metadata
        - ai_analysis
        - test_plans
      properties:
        run_id:
          type: string
          format: uuid
          nullable: true
        test_plan_execution_id:
          type: string
          format: uuid
          nullable: true
        scenario_execution_id:
          type: string
          format: uuid
          nullable: true
        step_execution_id:
          type: string
          format: uuid
          nullable: true
        project_id:
          type: string
          format: uuid
        run_type:
          type: string
          example: api_smoke
        status:
          type: string
          enum: [queued, pending, running, completed, failed, canceled, passed, error]
        summary:
          $ref: "#/components/schemas/ReportSummary"
        findings:
          type: array
          items:
            $ref: "#/components/schemas/Finding"
        evidence:
          type: array
          items:
            $ref: "#/components/schemas/Evidence"
        metadata:
          type: object
          additionalProperties: true
        ai_analysis:
          allOf:
            - $ref: "#/components/schemas/AIAnalysis"
          nullable: true
        test_plans:
          type: array
          items:
            $ref: "#/components/schemas/TestPlanRef"
        api_spec:
          allOf:
            - $ref: "#/components/schemas/APISpec"
          nullable: true
        api_summary:
          allOf:
            - $ref: "#/components/schemas/APISmokeSummary"
          nullable: true
        api_results:
          type: array
          items:
            $ref: "#/components/schemas/APICheckResult"
        login_summary:
          allOf:
            - $ref: "#/components/schemas/LoginSummary"
          nullable: true
    LoginSummary:
