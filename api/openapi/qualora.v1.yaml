components:
  securitySchemes:
    QualoraSession:
      type: apiKey
      in: cookie
      name: qualora_session
      description: HTTP-only local admin session cookie. Mutating requests also require `X-Qualora-CSRF` with the CSRF cookie value.
  parameters:
    ProjectID:
      name: project_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RunID:
      name: run_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    APISpecID:
      name: api_spec_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CredentialProfileID:
      name: credential_profile_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AuthorizationCheckID:
      name: authorization_check_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AuthorizationCheckRunID:
      name: authorization_check_run_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    DiscoveryRunID:
      name: discovery_run_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    QualityCheckRunID:
      name: quality_check_run_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SafeExplorerRunID:
      name: safe_explorer_run_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    QARunID:
      name: qa_run_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EvidenceID:
      name: evidence_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ProviderID:
      name: provider_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TestPlanID:
      name: test_plan_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ExecutionID:
      name: execution_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    SetupStatus:
      type: object
      required: [setup_required, version]
      properties:
        setup_required:
          type: boolean
        version:
          type: string
          example: 0.16.0-alpha
    SetupAdminRequest:
      type: object
      additionalProperties: false
      required: [email, display_name, password]
      properties:
        email:
          type: string
          format: email
        display_name:
          type: string
          minLength: 2
          maxLength: 120
        password:
          type: string
          format: password
          minLength: 12
        confirm_password:
          type: string
          format: password
          minLength: 12
    LoginRequest:
      type: object
      additionalProperties: false
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
    AuthUser:
      type: object
      required: [id, email, display_name, role, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        display_name:
          type: string
        role:
          type: string
          enum: [admin]
        last_login_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    AuthResponse:
      type: object
      required: [user, expires_at]
      properties:
        user:
          $ref: "#/components/schemas/AuthUser"
        expires_at:
          type: string
          format: date-time
        csrf_token:
          type: string
          description: Also set as the `qualora_csrf` cookie for browser clients.
        setup_status:
          type: string
          example: completed
    MeResponse:
      type: object
      required: [authenticated]
      properties:
        authenticated:
          type: boolean
        user:
          $ref: "#/components/schemas/AuthUser"
        expires_at:
          type: string
          format: date-time
    CreateProjectRequest:
      type: object
      additionalProperties: false
      description: At least one of frontend_url, api_base_url, or openapi_url is required.
      required:
        - name
        - allowed_hosts
      properties:
        name:
          type: string
        frontend_url:
          type: string
          default: ""
        api_base_url:
          type: string
          default: ""
        openapi_url:
          type: string
