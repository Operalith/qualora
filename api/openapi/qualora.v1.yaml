openapi: 3.0.3
info:
  title: Qualora Control Plane API
  version: 0.22.0-alpha
  description: API for first-run local admin setup, local session authentication, guided project onboarding, creating QA projects, running safe application discovery, passive quality checks, safe form testing for same-origin GET forms, policy-gated AI Browser Control, importing OpenAPI specs, managing encrypted API auth profiles, running safe authenticated read-only API smoke and lightweight OpenAPI contract checks, starting browser/API smoke runs, managing project-scoped credential profiles, running deterministic login checks and authenticated browser smoke tests, managing explicit role-aware authorization checks, managing optional OpenAI-compatible AI providers, generating reviewable AI test plans, executing approved safe test plan steps, reading protected reports with deterministic report intelligence, managing deterministic report baselines, comparing reports, evaluating CI-friendly quality gates, orchestrating native CI runs, managing optional sanitized GitHub/GitLab issue export, and downloading protected stored evidence objects.
servers:
  - url: http://localhost:8080
security:
  - QualoraSession: []
paths:
  /healthz:
    get:
      summary: Health check
      security: []
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: ok
        "503":
          $ref: "#/components/responses/Error"
  /api/v1/setup/status:
    get:
      summary: Get first-run setup status
      security: []
      responses:
        "200":
          description: Setup status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetupStatus"
  /api/v1/setup/admin:
    post:
      summary: Create the first local admin
      description: Public only while no local user exists. Creates an admin and sets session/CSRF cookies.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetupAdminRequest"
      responses:
        "201":
          description: Created admin session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          $ref: "#/components/responses/Error"
        "409":
          $ref: "#/components/responses/Error"
  /api/v1/auth/login:
    post:
      summary: Log in with the local admin account
      description: Sets an HTTP-only session cookie and a CSRF cookie. Mutating API requests must include the CSRF cookie value in `X-Qualora-CSRF`.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authenticated session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          $ref: "#/components/responses/Error"
  /api/v1/auth/logout:
    post:
      summary: Log out current session
      description: Revokes the current session when present and clears auth cookies.
      security: []
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                required: [logged_out]
                properties:
                  logged_out:
                    type: boolean
  /api/v1/auth/me:
    get:
      summary: Get current authenticated user
      security: []
      responses:
        "200":
          description: Current auth state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
  /api/v1/onboarding/project-setup:
    post:
      summary: Guided project setup
      description: Creates one project, optionally configures an AI provider, credential profile, and OpenAPI spec, then starts selected existing safe workflows. Destructive actions are rejected; raw credentials and provider secrets are never returned.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectSetupRequest"
            example:
              project:
                name: Qualora Demo Workflow
                frontend_url: http://demo-web:8080
                api_base_url: http://demo-api:8080
                openapi_url: ""
                allowed_hosts: ["demo-web", "demo-api"]
                security_mode: passive
                destructive_actions: false
                allow_private_targets: true
              ai:
                mode: demo
              credential:
                mode: create
                profile:
                  name: Demo Login
                  type: username_password
                  username: demo@example.com
                  password: dedicated-test-password
                  login_url: http://demo-web:8080/login
                  username_selector: "#username"
                  password_selector: "#password"
                  submit_selector: "#login-submit"
                  success_url_contains: /dashboard
                  success_text_contains: Authenticated area
                  failure_text_contains: Invalid credentials
                  post_login_wait_ms: 100
                  is_default: true
              api_spec:
                mode: demo
              workflow:
                browser_smoke: true
                discovery: true
                quality_checks: true
                safe_qa_run: true
                execute_safe_qa: false
                api_smoke: true
                authenticated_smoke: true
      responses:
        "201":
          description: Guided setup result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectSetupResponse"
        "400":
          $ref: "#/components/responses/Error"
  /api/v1/projects:
    post:
      summary: Create a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
            example:
              name: Example App
              frontend_url: https://example.com
              api_base_url: ""
              openapi_url: ""
              allowed_hosts: ["example.com"]
              security_mode: passive
              destructive_actions: false
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          $ref: "#/components/responses/Error"
        "405":
          $ref: "#/components/responses/Error"
    get:
      summary: List projects
      responses:
        "200":
          description: Project list
          content:
            application/json:
              schema:
                type: object
                required: [projects]
                properties:
                  projects:
                    type: array
                    items:
                      $ref: "#/components/schemas/Project"
        "405":
          $ref: "#/components/responses/Error"
  /api/v1/projects/{project_id}:
    get:
      summary: Get a project
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      responses:
        "200":
          description: Project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/projects/{project_id}/runs:
    get:
      summary: List runs for a project
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      responses:
        "200":
          description: Project run list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunList"
    post:
      summary: Start a QA run
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      responses:
        "201":
          description: Created run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestRun"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
  /api/v1/projects/{project_id}/browser-smoke-runs:
    post:
      summary: Start a browser smoke run
      description: Creates a run with only a browser smoke job. The project must have frontend_url configured.
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      responses:
        "201":
          description: Created browser smoke run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestRun"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
  /api/v1/projects/{project_id}/authenticated-browser-smoke-runs:
    post:
      summary: Start an authenticated browser smoke run
      description: Creates a deterministic selector-based login job followed by one same-origin authenticated target navigation. Credentials come from a project-scoped credential profile and are never returned by API responses.
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthenticatedBrowserSmokeRequest"
      responses:
        "201":
          description: Created authenticated browser smoke run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestRun"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
  /api/v1/projects/{project_id}/credential-profiles:
    get:
      summary: List credential profiles for a project
      description: Returns safe credential profile metadata only. Raw usernames and passwords are never returned.
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      responses:
        "200":
          description: Credential profile list
          content:
            application/json:
              schema:
                type: object
                required: [credential_profiles]
                properties:
                  credential_profiles:
                    type: array
                    items:
                      $ref: "#/components/schemas/CredentialProfile"
        "404":
          $ref: "#/components/responses/Error"
    post:
      summary: Create a credential profile
      description: Stores deterministic login selectors and encrypted username/password credentials for one project. The login URL must stay inside the project's allowed host policy and frontend origin.
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CredentialProfileRequest"
      responses:
        "201":
          description: Created credential profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CredentialProfile"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/credential-profiles/{credential_profile_id}:
    get:
      summary: Get a credential profile
      description: Returns safe credential profile metadata only. Raw usernames and passwords are never returned.
      parameters:
        - $ref: "#/components/parameters/CredentialProfileID"
      responses:
        "200":
          description: Credential profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CredentialProfile"
        "404":
          $ref: "#/components/responses/Error"
    put:
      summary: Update a credential profile
      description: Updates selectors and login criteria. Omit username or password to keep the existing encrypted secret value.
      parameters:
        - $ref: "#/components/parameters/CredentialProfileID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CredentialProfileRequest"
      responses:
        "200":
          description: Updated credential profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CredentialProfile"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    delete:
      summary: Delete a credential profile
      parameters:
        - $ref: "#/components/parameters/CredentialProfileID"
      responses:
        "204":
          description: Credential profile deleted
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/credential-profiles/{credential_profile_id}/test-login:
    post:
      summary: Test a deterministic credential-profile login flow
      description: Queues a browser job that opens only the configured login URL, fills the configured selectors, clicks the configured submit selector, and checks the configured success/failure criteria.
      parameters:
        - $ref: "#/components/parameters/CredentialProfileID"
      responses:
        "201":
          description: Created login check run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestRun"
        "404":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
  /api/v1/projects/{project_id}/api-auth-profiles:
    get:
      summary: List API authentication profiles for a project
      description: Returns safe API auth profile metadata only. Raw tokens, API keys, usernames, and passwords are never returned.
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      responses:
        "200":
          description: API auth profile list
          content:
            application/json:
              schema:
                type: object
                required: [api_auth_profiles]
                properties:
                  api_auth_profiles:
                    type: array
                    items:
                      $ref: "#/components/schemas/APIAuthProfile"
        "404":
          $ref: "#/components/responses/Error"
    post:
      summary: Create an API authentication profile
      description: Stores project-scoped API auth material encrypted at rest. API auth secrets are not returned, logged, sent to AI, stored in reports, or exported to issue trackers.
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/APIAuthProfileRequest"
      responses:
        "201":
          description: Created API auth profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIAuthProfile"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/api-auth-profiles/{api_auth_profile_id}:
    get:
      summary: Get an API authentication profile
      description: Returns safe metadata only. Secret values and encrypted payloads are never returned.
      parameters:
        - $ref: "#/components/parameters/APIAuthProfileID"
      responses:
        "200":
          description: API auth profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIAuthProfile"
        "404":
          $ref: "#/components/responses/Error"
    put:
      summary: Update an API authentication profile
      description: Omit secret fields to keep existing encrypted values.
      parameters:
        - $ref: "#/components/parameters/APIAuthProfileID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/APIAuthProfileRequest"
      responses:
        "200":
          description: Updated API auth profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIAuthProfile"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    delete:
      summary: Delete an API authentication profile
      parameters:
        - $ref: "#/components/parameters/APIAuthProfileID"
      responses:
        "204":
          description: API auth profile deleted
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/api-auth-profiles/{api_auth_profile_id}/test:
    post:
      summary: Test an API authentication profile
      description: Performs one safe GET or HEAD against the project API base URL plus an optional safe path. Auth headers are redacted in the result.
      parameters:
        - $ref: "#/components/parameters/APIAuthProfileID"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/APIAuthProfileTestRequest"
      responses:
        "200":
          description: API auth test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APIAuthProfileTestResult"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/projects/{project_id}/authorization-checks:
    get:
      summary: List authorization checks for a project
      description: Returns explicit role-aware authorization checks. Checks are user-configured and conservative; Qualora does not generate or execute arbitrary authorization attacks.
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      responses:
        "200":
          description: Authorization check list
          content:
            application/json:
              schema:
                type: object
                required: [authorization_checks]
                properties:
                  authorization_checks:
                    type: array
                    items:
                      $ref: "#/components/schemas/AuthorizationCheck"
        "404":
          $ref: "#/components/responses/Error"
    post:
      summary: Create an authorization check
      description: Creates an explicit read-only browser URL authorization check. Browser targets must stay on the project frontend origin and allowed hosts.
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthorizationCheckRequest"
      responses:
        "201":
          description: Created authorization check
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthorizationCheck"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/authorization-checks/{authorization_check_id}:
    get:
      summary: Get an authorization check
      parameters:
        - $ref: "#/components/parameters/AuthorizationCheckID"
      responses:
        "200":
          description: Authorization check
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthorizationCheck"
        "404":
          $ref: "#/components/responses/Error"
    put:
      summary: Update an authorization check
      parameters:
        - $ref: "#/components/parameters/AuthorizationCheckID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthorizationCheckRequest"
      responses:
        "200":
          description: Updated authorization check
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthorizationCheck"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    delete:
      summary: Delete an authorization check
      parameters:
        - $ref: "#/components/parameters/AuthorizationCheckID"
      responses:
        "204":
          description: Authorization check deleted
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/projects/{project_id}/authorization-check-runs:
    get:
      summary: List authorization check runs for a project
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      responses:
        "200":
          description: Authorization run list
          content:
            application/json:
              schema:
                type: object
                required: [authorization_check_runs]
                properties:
                  authorization_check_runs:
                    type: array
                    items:
                      $ref: "#/components/schemas/AuthorizationCheckRun"
        "404":
          $ref: "#/components/responses/Error"
    post:
      summary: Start an authorization check run
      description: Queues explicit browser URL authorization checks. Login is deterministic and selector-based; no crawling, payload attacks, destructive actions, or autonomous AI browser control are performed.
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthorizationCheckRunRequest"
      responses:
        "201":
          description: Created authorization check run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthorizationCheckRun"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
  /api/v1/authorization-check-runs/{authorization_check_run_id}:
    get:
      summary: Get an authorization check run
      parameters:
        - $ref: "#/components/parameters/AuthorizationCheckRunID"
      responses:
        "200":
          description: Authorization run detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthorizationCheckDetail"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/authorization-check-runs/{authorization_check_run_id}/report:
    get:
      summary: Get a structured authorization report
      parameters:
        - $ref: "#/components/parameters/AuthorizationCheckRunID"
      responses:
        "200":
          description: Authorization report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthorizationCheckReport"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/authorization-check-runs/{authorization_check_run_id}/report.html:
    get:
      summary: Get a self-contained HTML authorization report
      parameters:
        - $ref: "#/components/parameters/AuthorizationCheckRunID"
      responses:
        "200":
          description: HTML authorization report
          content:
            text/html:
              schema:
                type: string
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/projects/{project_id}/discovery-runs:
    get:
      summary: List discovery runs for a project
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      responses:
        "200":
          description: Discovery run list
          content:
            application/json:
              schema:
                type: object
                required: [discovery_runs]
                properties:
                  discovery_runs:
                    type: array
                    items:
                      $ref: "#/components/schemas/DiscoveryRun"
    post:
      summary: Start a safe application discovery run
      description: Queues bounded deterministic discovery. Discovery follows safe links only, defaults to same-origin navigation, records skipped links, and never submits forms, clicks arbitrary buttons, performs destructive actions, or uses autonomous AI browser control.
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DiscoveryRunRequest"
      responses:
        "201":
          description: Created discovery run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscoveryRun"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
  /api/v1/discovery-runs/{discovery_run_id}:
    get:
      summary: Get a discovery run
      parameters:
        - $ref: "#/components/parameters/DiscoveryRunID"
      responses:
        "200":
          description: Discovery run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscoveryRun"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/discovery-runs/{discovery_run_id}/map:
    get:
      summary: Get a discovery application map
      parameters:
        - $ref: "#/components/parameters/DiscoveryRunID"
      responses:
        "200":
          description: Discovery map
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscoveryMap"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/discovery-runs/{discovery_run_id}/report:
    get:
      summary: Get a structured discovery report
      parameters:
        - $ref: "#/components/parameters/DiscoveryRunID"
      responses:
        "200":
          description: Discovery report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiscoveryReport"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/discovery-runs/{discovery_run_id}/report.html:
    get:
      summary: Get a self-contained HTML discovery report
      parameters:
        - $ref: "#/components/parameters/DiscoveryRunID"
      responses:
        "200":
          description: HTML discovery report
          content:
            text/html:
              schema:
                type: string
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/projects/{project_id}/safe-explorer-runs:
    get:
      summary: List Interactive Safe Explorer runs for a project
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      responses:
        "200":
          description: Safe Explorer run list
          content:
            application/json:
              schema:
                type: object
                required: [safe_explorer_runs]
                properties:
                  safe_explorer_runs:
                    type: array
                    items:
                      $ref: "#/components/schemas/SafeExplorerRun"
        "404":
          $ref: "#/components/responses/Error"
    post:
      summary: Start an Interactive Safe Explorer run
      description: Queues bounded deterministic exploration of safe same-origin navigation actions. Safe Explorer records executed and skipped actions with reasons, never lets AI choose actions, does not submit POST forms, and avoids destructive-looking interactions.
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SafeExplorerRunRequest"
      responses:
        "201":
          description: Created Safe Explorer run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SafeExplorerRun"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
  /api/v1/safe-explorer-runs/{safe_explorer_run_id}:
    get:
      summary: Get a Safe Explorer run
      parameters:
        - $ref: "#/components/parameters/SafeExplorerRunID"
      responses:
        "200":
          description: Safe Explorer run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SafeExplorerRun"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/safe-explorer-runs/{safe_explorer_run_id}/trace:
    get:
      summary: Get the Safe Explorer timeline trace
      parameters:
