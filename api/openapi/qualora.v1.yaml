openapi: 3.0.3
info:
  title: Qualora Control Plane API
  version: 0.1.0
  description: MVP API for creating projects, starting browser smoke runs, and reading reports.
servers:
  - url: http://localhost:8080
paths:
  /healthz:
    get:
      summary: Health check
      responses:
        "200":
          description: Service is healthy
  /api/v1/projects:
    post:
      summary: Create a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    get:
      summary: List projects
      responses:
        "200":
          description: Project list
          content:
            application/json:
              schema:
                type: object
                properties:
                  projects:
                    type: array
                    items:
                      $ref: "#/components/schemas/Project"
  /api/v1/projects/{project_id}:
    get:
      summary: Get a project
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      responses:
        "200":
          description: Project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
  /api/v1/projects/{project_id}/runs:
    post:
      summary: Start a browser smoke run
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      responses:
        "201":
          description: Created run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestRun"
  /api/v1/runs/{run_id}:
    get:
      summary: Get a run
      parameters:
        - $ref: "#/components/parameters/RunID"
      responses:
        "200":
          description: Run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestRun"
  /api/v1/runs/{run_id}/report:
    get:
      summary: Get a structured run report
      parameters:
        - $ref: "#/components/parameters/RunID"
      responses:
        "200":
          description: Report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Report"
components:
  parameters:
    ProjectID:
      name: project_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RunID:
      name: run_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    CreateProjectRequest:
      type: object
      required:
        - name
        - frontend_url
        - allowed_hosts
      properties:
        name:
          type: string
        frontend_url:
          type: string
          format: uri
        api_base_url:
          type: string
        openapi_url:
          type: string
        allowed_hosts:
          type: array
          items:
            type: string
        security_mode:
          type: string
          enum: [passive]
          default: passive
        destructive_actions:
          type: boolean
          default: false
        allow_private_targets:
          type: boolean
          default: false
    Project:
      allOf:
        - $ref: "#/components/schemas/CreateProjectRequest"
        - type: object
          required:
            - id
            - created_at
            - updated_at
          properties:
            id:
              type: string
              format: uuid
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
    TestRun:
      type: object
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, running, completed, failed, canceled]
        error_message:
          type: string
        page_title:
          type: string
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Report:
      type: object
      properties:
        run_id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        status:
          type: string
        summary:
          $ref: "#/components/schemas/ReportSummary"
        findings:
          type: array
          items:
            $ref: "#/components/schemas/Finding"
        evidence:
          type: array
          items:
            $ref: "#/components/schemas/Evidence"
        metadata:
          type: object
          additionalProperties: true
    ReportSummary:
      type: object
      properties:
        total_findings:
          type: integer
        critical:
          type: integer
        high:
          type: integer
        medium:
          type: integer
        low:
          type: integer
        info:
          type: integer
    Finding:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        severity:
          type: string
          enum: [critical, high, medium, low, info]
        category:
          type: string
        confidence:
          type: string
          enum: [high, medium, low]
        description:
          type: string
        recommendation:
          type: string
        evidence_ids:
          type: array
          items:
            type: string
            format: uuid
    Evidence:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
        uri:
          type: string
        metadata:
          type: object
          additionalProperties: true
