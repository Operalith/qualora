openapi: 3.0.3
info:
  title: Qualora Control Plane API
  version: 0.8.0-alpha
  description: API for creating QA projects, importing OpenAPI specs, running safe read-only API smoke tests, starting browser/API smoke runs, managing optional OpenAI-compatible AI providers, generating reviewable AI test plans, executing approved safe test plan steps, reading reports, and downloading stored evidence objects.
servers:
  - url: http://localhost:8080
paths:
  /healthz:
    get:
      summary: Health check
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: ok
        "503":
          $ref: "#/components/responses/Error"
  /api/v1/projects:
    post:
      summary: Create a project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
            example:
              name: Example App
              frontend_url: https://example.com
              api_base_url: ""
              openapi_url: ""
              allowed_hosts: ["example.com"]
              security_mode: passive
              destructive_actions: false
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "400":
          $ref: "#/components/responses/Error"
        "405":
          $ref: "#/components/responses/Error"
    get:
      summary: List projects
      responses:
        "200":
          description: Project list
          content:
            application/json:
              schema:
                type: object
                required: [projects]
                properties:
                  projects:
                    type: array
                    items:
                      $ref: "#/components/schemas/Project"
        "405":
          $ref: "#/components/responses/Error"
  /api/v1/projects/{project_id}:
    get:
      summary: Get a project
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      responses:
        "200":
          description: Project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/projects/{project_id}/runs:
    get:
      summary: List runs for a project
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      responses:
        "200":
          description: Project run list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunList"
    post:
      summary: Start a QA run
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      responses:
        "201":
          description: Created run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestRun"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
  /api/v1/projects/{project_id}/browser-smoke-runs:
    post:
      summary: Start a browser smoke run
      description: Creates a run with only a browser smoke job. The project must have frontend_url configured.
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      responses:
        "201":
          description: Created browser smoke run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestRun"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
  /api/v1/projects/{project_id}/ai-test-plans:
    post:
      summary: Generate an AI-assisted test plan for a project
      description: Synchronously builds a sanitized project/run context and sends it to the selected or default OpenAI-compatible provider. Generated plans are suggestions; only explicitly approved safe DSL steps can be executed.
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AITestPlanRequest"
      responses:
        "201":
          description: AI test plan record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestPlan"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/projects/{project_id}/test-plans:
    get:
      summary: List AI test plans for a project
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      responses:
        "200":
          description: Project test plan list
          content:
            application/json:
              schema:
                type: object
                required: [test_plans]
                properties:
                  test_plans:
                    type: array
                    items:
                      $ref: "#/components/schemas/TestPlan"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/projects/{project_id}/api-specs:
    get:
      summary: List OpenAPI specs for a project
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      responses:
        "200":
          description: API spec list
          content:
            application/json:
              schema:
                type: object
                required: [api_specs]
                properties:
                  api_specs:
                    type: array
                    items:
                      $ref: "#/components/schemas/APISpec"
        "404":
          $ref: "#/components/responses/Error"
    post:
      summary: Import an OpenAPI spec
      description: Imports OpenAPI 3.x from a project-scoped URL or inline JSON/YAML. Import discovers operations only; it does not execute API requests.
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/APISpecImportRequest"
      responses:
        "201":
          description: Imported API spec detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APISpecDetail"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/api-specs/{api_spec_id}:
    get:
      summary: Get OpenAPI spec metadata and discovered operations
      parameters:
        - $ref: "#/components/parameters/APISpecID"
      responses:
        "200":
          description: API spec detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APISpecDetail"
        "404":
          $ref: "#/components/responses/Error"
    delete:
      summary: Delete an imported OpenAPI spec
      parameters:
        - $ref: "#/components/parameters/APISpecID"
      responses:
        "200":
          description: Delete result
          content:
            application/json:
              schema:
                type: object
                required: [deleted]
                properties:
                  deleted:
                    type: boolean
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/api-specs/{api_spec_id}/operations:
    get:
      summary: List discovered API operations
      parameters:
        - $ref: "#/components/parameters/APISpecID"
      responses:
        "200":
          description: Operation list
          content:
            application/json:
              schema:
                type: object
                required: [operations]
                properties:
                  operations:
                    type: array
                    items:
                      $ref: "#/components/schemas/APIOperation"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/api-specs/{api_spec_id}/api-smoke-runs:
    post:
      summary: Run safe API smoke checks
      description: Executes only imported operations classified as safe read-only operations. Mutating, authenticated, ambiguous, and unsupported operations are skipped.
      parameters:
        - $ref: "#/components/parameters/APISpecID"
      responses:
        "201":
          description: Completed API smoke run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestRun"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/runs:
    get:
      summary: List runs
      responses:
        "200":
          description: Run list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunList"
        "405":
          $ref: "#/components/responses/Error"
  /api/v1/runs/{run_id}:
    get:
      summary: Get a run
      parameters:
        - $ref: "#/components/parameters/RunID"
      responses:
        "200":
          description: Run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestRun"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/runs/{run_id}/report:
    get:
      summary: Get a structured run report
      parameters:
        - $ref: "#/components/parameters/RunID"
      responses:
        "200":
          description: Report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Report"
              example:
                run_id: d76f71c6-60d0-42fd-9bce-fae54ab6bef1
                project_id: 85db0da7-fd0d-44bc-ae5a-c41cd1f03d47
                status: completed
                summary:
                  total_findings: 0
                  critical: 0
                  high: 0
                  medium: 0
                  low: 0
                  info: 0
                findings: []
                evidence:
                  - id: 90d77c2a-7599-4e6f-8d66-d7e8fd0b7c1f
                    type: screenshot
                    uri: s3://qualora-evidence/runs/d76f71c6-60d0-42fd-9bce-fae54ab6bef1/screenshots/1720944000-screen.png
                    metadata:
                      filename: 1720944000-screen.png
                      key: runs/d76f71c6-60d0-42fd-9bce-fae54ab6bef1/screenshots/1720944000-screen.png
                      content_type: image/png
                      size_bytes: 30421
                      target_url: http://demo-web:8080/
                      final_url: http://demo-web:8080/
                      page_title: Qualora Demo Web
                      status_code: 200
                  - id: cc5616bb-2b11-4c91-8c0a-ec3c1f890dd8
                    type: browser_observations
                    uri: inline://browser-observations
                    metadata:
                      target_url: http://demo-web:8080/
                      final_url: http://demo-web:8080/
                      page_title: Qualora Demo Web
                      status_code: 200
                      body_text_length: 73
                      timed_out: false
                      console_errors: []
                      failed_requests: []
                  - id: afcf6fd9-2512-45d0-a9a5-5d9073c55981
                    type: api_observations
                    uri: inline://api-observations
                    metadata:
                      api_base_url: http://mock-api:8080/
                      openapi_url: http://mock-api:8080/openapi.json
                      checked_endpoints: 3
                      failed_endpoints: 0
                      safe_methods_only: true
                  - id: 1c56226f-98cd-4953-afd1-086d8f37e056
                    type: openapi_summary
                    uri: inline://openapi-summary
                    metadata:
                      version: 3.0.3
                      paths: 3
                      safe_operations: 2
                      skipped_unsafe_operations: 1
                metadata:
                  jobs:
                    - kind: api
                      status: completed
                ai_analysis: null
                test_plans: []
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/runs/{run_id}/report.html:
    get:
      summary: Get a self-contained HTML run report
      parameters:
        - $ref: "#/components/parameters/RunID"
      responses:
        "200":
          description: HTML report
          content:
            text/html:
              schema:
                type: string
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/runs/{run_id}/api-results:
    get:
      summary: Get API smoke check results for a run
      parameters:
        - $ref: "#/components/parameters/RunID"
      responses:
        "200":
          description: API result list
          content:
            application/json:
              schema:
                type: object
                required: [api_results]
                properties:
                  api_results:
                    type: array
                    items:
                      $ref: "#/components/schemas/APICheckResult"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/runs/{run_id}/ai-analysis:
    get:
      summary: Get latest AI analysis for a run
      description: Returns null when no AI analysis has been generated. AI is optional and reports work without it.
      parameters:
        - $ref: "#/components/parameters/RunID"
      responses:
        "200":
          description: Latest AI analysis wrapper
          content:
            application/json:
              schema:
                type: object
                required: [ai_analysis]
                properties:
                  ai_analysis:
                    allOf:
                      - $ref: "#/components/schemas/AIAnalysis"
                    nullable: true
    post:
      summary: Run AI analysis for an existing run
      description: Synchronously builds a sanitized report input and sends it to the selected or default OpenAI-compatible provider.
      parameters:
        - $ref: "#/components/parameters/RunID"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AIAnalysisRequest"
      responses:
        "201":
          description: AI analysis record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIAnalysis"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/ai/providers:
    get:
      summary: List AI providers
      responses:
        "200":
          description: AI provider list
          content:
            application/json:
              schema:
                type: object
                required: [providers]
                properties:
                  providers:
                    type: array
                    items:
                      $ref: "#/components/schemas/AIProvider"
    post:
      summary: Create AI provider
      description: Stores API keys and extra headers encrypted at rest. Raw secrets are never returned.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AIProviderRequest"
      responses:
        "201":
          description: Created AI provider
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIProvider"
        "400":
          $ref: "#/components/responses/Error"
  /api/v1/ai/providers/{provider_id}:
    get:
      summary: Get AI provider
      parameters:
        - $ref: "#/components/parameters/ProviderID"
      responses:
        "200":
          description: AI provider
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIProvider"
        "404":
          $ref: "#/components/responses/Error"
    put:
      summary: Update AI provider
      parameters:
        - $ref: "#/components/parameters/ProviderID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AIProviderRequest"
      responses:
        "200":
          description: Updated AI provider
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIProvider"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    delete:
      summary: Delete AI provider
      parameters:
        - $ref: "#/components/parameters/ProviderID"
      responses:
        "200":
          description: Delete result
          content:
            application/json:
              schema:
                type: object
                required: [deleted]
                properties:
                  deleted:
                    type: boolean
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/ai/providers/{provider_id}/test:
    post:
      summary: Test AI provider connection
      description: Sends a minimal safe JSON prompt to the provider and returns a sanitized success/failure result.
      parameters:
        - $ref: "#/components/parameters/ProviderID"
      responses:
        "200":
          description: Provider test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIProviderTestResult"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/test-plans/{test_plan_id}:
    get:
      summary: Get an AI test plan
      parameters:
        - $ref: "#/components/parameters/TestPlanID"
      responses:
        "200":
          description: AI test plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestPlan"
        "404":
          $ref: "#/components/responses/Error"
    delete:
      summary: Delete an AI test plan
      parameters:
        - $ref: "#/components/parameters/TestPlanID"
      responses:
        "200":
          description: Delete result
          content:
            application/json:
              schema:
                type: object
                required: [deleted]
                properties:
                  deleted:
                    type: boolean
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/test-plans/{test_plan_id}/export.json:
    get:
      summary: Export the normalized AI test plan JSON payload
      parameters:
        - $ref: "#/components/parameters/TestPlanID"
      responses:
        "200":
          description: Normalized test plan payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestPlanPayload"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/test-plans/{test_plan_id}/executions:
    get:
      summary: List safe executions for a test plan
      parameters:
        - $ref: "#/components/parameters/TestPlanID"
      responses:
        "200":
          description: Test plan execution list
          content:
            application/json:
              schema:
                type: object
                required: [executions]
                properties:
                  executions:
                    type: array
                    items:
                      $ref: "#/components/schemas/TestPlanExecution"
        "404":
          $ref: "#/components/responses/Error"
    post:
      summary: Preview or start an approved safe test plan execution
      description: Runs the deterministic safety mapper. With dry_run=true, returns a preview only. With dry_run=false, queues only supported safe browser DSL steps and skips unsupported, destructive, authenticated, or ambiguous steps.
      parameters:
        - $ref: "#/components/parameters/TestPlanID"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestPlanExecutionRequest"
      responses:
        "200":
          description: Dry-run execution preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestPlanExecutionPreview"
        "201":
          description: Queued execution detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestPlanExecutionDetail"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
  /api/v1/test-plan-executions/{execution_id}:
    get:
      summary: Get a safe test plan execution
      parameters:
        - $ref: "#/components/parameters/ExecutionID"
      responses:
        "200":
          description: Execution detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestPlanExecutionDetail"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/test-plan-executions/{execution_id}/report:
    get:
      summary: Get a structured safe test plan execution report
      parameters:
        - $ref: "#/components/parameters/ExecutionID"
      responses:
        "200":
          description: Execution report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestPlanExecutionReport"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/test-plan-executions/{execution_id}/report.html:
    get:
      summary: Get a self-contained HTML safe test plan execution report
      parameters:
        - $ref: "#/components/parameters/ExecutionID"
      responses:
        "200":
          description: HTML execution report
          content:
            text/html:
              schema:
                type: string
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/evidence/{evidence_id}:
    get:
      summary: Download a stored evidence object
      description: Serves only Qualora evidence records known to the database. Inline metadata evidence is not downloadable.
      parameters:
        - $ref: "#/components/parameters/EvidenceID"
      responses:
        "200":
          description: Evidence object
          content:
            image/png:
              schema:
                type: string
                format: binary
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          $ref: "#/components/responses/Error"
components:
  parameters:
    ProjectID:
      name: project_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RunID:
      name: run_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    APISpecID:
      name: api_spec_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EvidenceID:
      name: evidence_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ProviderID:
      name: provider_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TestPlanID:
      name: test_plan_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ExecutionID:
      name: execution_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    CreateProjectRequest:
      type: object
      additionalProperties: false
      description: At least one of frontend_url, api_base_url, or openapi_url is required.
      required:
        - name
        - allowed_hosts
      properties:
        name:
          type: string
        frontend_url:
          type: string
          default: ""
        api_base_url:
          type: string
          default: ""
        openapi_url:
          type: string
          default: ""
        allowed_hosts:
          type: array
          minItems: 1
          items:
            type: string
        security_mode:
          type: string
          enum: [passive]
          default: passive
        destructive_actions:
          type: boolean
          default: false
          description: Destructive actions are off by default and are not used by safe test plan execution in v0.7.0-alpha.
        allow_private_targets:
          type: boolean
          default: false
    Project:
      type: object
      required:
        - id
        - name
        - frontend_url
        - api_base_url
        - openapi_url
        - allowed_hosts
        - security_mode
        - destructive_actions
        - allow_private_targets
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        frontend_url:
          type: string
        api_base_url:
          type: string
        openapi_url:
          type: string
        allowed_hosts:
          type: array
          items:
            type: string
        security_mode:
          type: string
          enum: [passive]
        destructive_actions:
          type: boolean
        allow_private_targets:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    TestRun:
      type: object
      required:
        - id
        - project_id
        - run_type
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        run_type:
          type: string
          enum: [full, browser_smoke, api_smoke]
        api_spec_id:
          type: string
          format: uuid
          nullable: true
        status:
          type: string
          enum: [queued, pending, running, completed, failed, canceled, passed, error]
        error_message:
          type: string
        page_title:
          type: string
        started_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    RunList:
      type: object
      required: [runs]
      properties:
        runs:
          type: array
          items:
            $ref: "#/components/schemas/TestRun"
    APISpecImportRequest:
      type: object
      additionalProperties: false
      required: [name, source_type]
      properties:
        name:
          type: string
        source_type:
          type: string
          enum: [url, inline, demo]
        source_url:
          type: string
          nullable: true
        raw_spec:
          type: string
          nullable: true
          description: Inline OpenAPI JSON/YAML. Stored locally for the alpha import record.
    APISpec:
      type: object
      required:
        - id
        - project_id
        - name
        - source_type
        - operation_count
        - safe_operation_count
