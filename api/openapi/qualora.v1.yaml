        discovery_run_id:
          type: string
          format: uuid
          nullable: true
        quality_check_run_id:
          type: string
          format: uuid
          nullable: true
        api_smoke_run_id:
          type: string
          format: uuid
          nullable: true
        test_plan_id:
          type: string
          format: uuid
          nullable: true
        test_plan_execution_id:
          type: string
          format: uuid
          nullable: true
        credential_profile_id:
          type: string
          format: uuid
          nullable: true
        api_auth_profile_id:
          type: string
          format: uuid
          nullable: true
        error_message:
          type: string
        summary:
          type: object
          additionalProperties: true
        started_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
