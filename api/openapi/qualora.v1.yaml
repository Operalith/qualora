      description: Imports OpenAPI 3.x from a project-scoped URL or inline JSON/YAML. Import discovers operations only; it does not execute API requests.
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/APISpecImportRequest"
      responses:
        "201":
          description: Imported API spec detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APISpecDetail"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/api-specs/{api_spec_id}:
    get:
      summary: Get OpenAPI spec metadata and discovered operations
      parameters:
        - $ref: "#/components/parameters/APISpecID"
      responses:
        "200":
          description: API spec detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/APISpecDetail"
        "404":
          $ref: "#/components/responses/Error"
    delete:
      summary: Delete an imported OpenAPI spec
      parameters:
        - $ref: "#/components/parameters/APISpecID"
      responses:
        "200":
          description: Delete result
          content:
            application/json:
              schema:
                type: object
                required: [deleted]
                properties:
                  deleted:
                    type: boolean
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/api-specs/{api_spec_id}/operations:
    get:
      summary: List discovered API operations
      parameters:
        - $ref: "#/components/parameters/APISpecID"
      responses:
        "200":
          description: Operation list
          content:
            application/json:
              schema:
                type: object
                required: [operations]
                properties:
                  operations:
                    type: array
                    items:
                      $ref: "#/components/schemas/APIOperation"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/api-specs/{api_spec_id}/api-smoke-runs:
    post:
      summary: Run safe API smoke and lightweight contract checks
      description: Executes only imported operations classified as safe read-only operations. Authenticated runs can execute authenticated safe operations with a selected API auth profile. Mutating, ambiguous, request-body, destructive, and unsupported operations are skipped. Request/response bodies and auth headers are not stored.
      parameters:
        - $ref: "#/components/parameters/APISpecID"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/APISmokeRunRequest"
      responses:
        "201":
          description: Completed API smoke run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestRun"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/runs:
    get:
      summary: List runs
      responses:
        "200":
          description: Run list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunList"
        "405":
          $ref: "#/components/responses/Error"
  /api/v1/runs/{run_id}:
    get:
      summary: Get a run
      parameters:
        - $ref: "#/components/parameters/RunID"
      responses:
        "200":
          description: Run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestRun"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/runs/{run_id}/report:
    get:
      summary: Get a structured run report
      parameters:
        - $ref: "#/components/parameters/RunID"
      responses:
        "200":
          description: Report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Report"
