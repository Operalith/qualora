                test_plans: []
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/runs/{run_id}/report.html:
    get:
      summary: Get a self-contained HTML run report
      parameters:
        - $ref: "#/components/parameters/RunID"
      responses:
        "200":
          description: HTML report
          content:
            text/html:
              schema:
                type: string
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/runs/{run_id}/api-results:
    get:
      summary: Get API smoke check results for a run
      parameters:
        - $ref: "#/components/parameters/RunID"
      responses:
        "200":
          description: API result list
          content:
            application/json:
              schema:
                type: object
                required: [api_results]
                properties:
                  api_results:
                    type: array
                    items:
                      $ref: "#/components/schemas/APICheckResult"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/runs/{run_id}/ai-analysis:
    get:
      summary: Get latest AI analysis for a run
      description: Returns null when no AI analysis has been generated. AI is optional and reports work without it.
      parameters:
        - $ref: "#/components/parameters/RunID"
      responses:
        "200":
          description: Latest AI analysis wrapper
          content:
            application/json:
              schema:
                type: object
                required: [ai_analysis]
                properties:
                  ai_analysis:
                    allOf:
                      - $ref: "#/components/schemas/AIAnalysis"
                    nullable: true
    post:
      summary: Run AI analysis for an existing run
      description: Synchronously builds a sanitized report input and sends it to the selected or default OpenAI-compatible provider.
      parameters:
        - $ref: "#/components/parameters/RunID"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AIAnalysisRequest"
      responses:
        "201":
          description: AI analysis record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIAnalysis"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/ai/providers:
    get:
      summary: List AI providers
      responses:
        "200":
          description: AI provider list
          content:
            application/json:
              schema:
                type: object
                required: [providers]
                properties:
                  providers:
                    type: array
                    items:
                      $ref: "#/components/schemas/AIProvider"
    post:
      summary: Create AI provider
      description: Stores API keys and extra headers encrypted at rest. Raw secrets are never returned.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AIProviderRequest"
      responses:
        "201":
          description: Created AI provider
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIProvider"
        "400":
          $ref: "#/components/responses/Error"
  /api/v1/ai/providers/{provider_id}:
    get:
      summary: Get AI provider
      parameters:
        - $ref: "#/components/parameters/ProviderID"
      responses:
        "200":
          description: AI provider
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIProvider"
        "404":
          $ref: "#/components/responses/Error"
    put:
      summary: Update AI provider
      parameters:
        - $ref: "#/components/parameters/ProviderID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AIProviderRequest"
      responses:
        "200":
          description: Updated AI provider
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIProvider"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
    delete:
      summary: Delete AI provider
      parameters:
        - $ref: "#/components/parameters/ProviderID"
      responses:
        "200":
          description: Delete result
          content:
            application/json:
              schema:
                type: object
                required: [deleted]
                properties:
                  deleted:
                    type: boolean
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/ai/providers/{provider_id}/test:
    post:
      summary: Test AI provider connection
      description: Sends a minimal safe JSON prompt to the provider and returns a sanitized success/failure result.
      parameters:
        - $ref: "#/components/parameters/ProviderID"
      responses:
        "200":
          description: Provider test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIProviderTestResult"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/test-plans/{test_plan_id}:
    get:
      summary: Get an AI test plan
      parameters:
        - $ref: "#/components/parameters/TestPlanID"
      responses:
        "200":
          description: AI test plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestPlan"
        "404":
          $ref: "#/components/responses/Error"
    delete:
      summary: Delete an AI test plan
      parameters:
        - $ref: "#/components/parameters/TestPlanID"
      responses:
        "200":
          description: Delete result
          content:
            application/json:
              schema:
                type: object
                required: [deleted]
                properties:
                  deleted:
                    type: boolean
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/test-plans/{test_plan_id}/export.json:
    get:
      summary: Export the normalized AI test plan JSON payload
      parameters:
        - $ref: "#/components/parameters/TestPlanID"
      responses:
        "200":
          description: Normalized test plan payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestPlanPayload"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/test-plans/{test_plan_id}/executions:
    get:
      summary: List safe executions for a test plan
      parameters:
        - $ref: "#/components/parameters/TestPlanID"
      responses:
        "200":
          description: Test plan execution list
          content:
            application/json:
              schema:
                type: object
                required: [executions]
                properties:
                  executions:
                    type: array
                    items:
                      $ref: "#/components/schemas/TestPlanExecution"
        "404":
          $ref: "#/components/responses/Error"
    post:
      summary: Preview or start an approved safe test plan execution
      description: Runs the deterministic safety mapper. With dry_run=true, returns a preview only. With dry_run=false, queues only supported safe browser DSL steps and skips unsupported, destructive, authenticated, or ambiguous steps.
      parameters:
        - $ref: "#/components/parameters/TestPlanID"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestPlanExecutionRequest"
      responses:
        "200":
          description: Dry-run execution preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestPlanExecutionPreview"
        "201":
          description: Queued execution detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestPlanExecutionDetail"
        "400":
          $ref: "#/components/responses/Error"
        "404":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
  /api/v1/test-plan-executions/{execution_id}:
    get:
      summary: Get a safe test plan execution
      parameters:
        - $ref: "#/components/parameters/ExecutionID"
      responses:
        "200":
          description: Execution detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestPlanExecutionDetail"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/test-plan-executions/{execution_id}/report:
    get:
      summary: Get a structured safe test plan execution report
      parameters:
        - $ref: "#/components/parameters/ExecutionID"
      responses:
        "200":
          description: Execution report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestPlanExecutionReport"
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/test-plan-executions/{execution_id}/report.html:
    get:
      summary: Get a self-contained HTML safe test plan execution report
      parameters:
        - $ref: "#/components/parameters/ExecutionID"
      responses:
        "200":
          description: HTML execution report
          content:
            text/html:
              schema:
                type: string
        "404":
          $ref: "#/components/responses/Error"
  /api/v1/evidence/{evidence_id}:
    get:
      summary: Download a stored evidence object
      description: Serves only Qualora evidence records known to the database. Inline metadata evidence is not downloadable.
      parameters:
        - $ref: "#/components/parameters/EvidenceID"
      responses:
        "200":
          description: Evidence object
          content:
            image/png:
              schema:
                type: string
                format: binary
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          $ref: "#/components/responses/Error"
components:
  securitySchemes:
    QualoraSession:
      type: apiKey
      in: cookie
      name: qualora_session
      description: HTTP-only local admin session cookie. Mutating requests also require `X-Qualora-CSRF` with the CSRF cookie value.
  parameters:
    ProjectID:
      name: project_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RunID:
      name: run_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    APISpecID:
      name: api_spec_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CredentialProfileID:
      name: credential_profile_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    APIAuthProfileID:
      name: api_auth_profile_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AuthorizationCheckID:
      name: authorization_check_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AuthorizationCheckRunID:
      name: authorization_check_run_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    DiscoveryRunID:
      name: discovery_run_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    QualityCheckRunID:
      name: quality_check_run_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SafeExplorerRunID:
      name: safe_explorer_run_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AIBrowserControlRunID:
      name: ai_browser_control_run_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    FormTestRunID:
      name: form_test_run_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    QARunID:
      name: qa_run_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CIRunID:
      name: ci_run_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ReportBaselineID:
      name: baseline_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    IssueExportConfigID:
      name: issue_export_config_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ReportType:
      name: report_type
      in: path
      required: true
      schema:
        type: string
        enum: [safe_qa, quality_check, discovery, safe_explorer, ai_browser_control, form_test, api_smoke, browser_smoke, authorization]
    ReportID:
      name: report_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EvidenceID:
      name: evidence_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ProviderID:
      name: provider_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TestPlanID:
      name: test_plan_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ExecutionID:
      name: execution_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    SetupStatus:
      type: object
      required: [setup_required, version]
      properties:
        setup_required:
          type: boolean
        version:
          type: string
          example: 0.22.0-alpha
    SetupAdminRequest:
      type: object
      additionalProperties: false
      required: [email, display_name, password]
      properties:
        email:
          type: string
          format: email
        display_name:
          type: string
          minLength: 2
          maxLength: 120
        password:
          type: string
          format: password
          minLength: 12
        confirm_password:
          type: string
          format: password
          minLength: 12
    LoginRequest:
      type: object
      additionalProperties: false
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
    AuthUser:
      type: object
      required: [id, email, display_name, role, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        display_name:
          type: string
        role:
          type: string
          enum: [admin]
        last_login_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    AuthResponse:
      type: object
      required: [user, expires_at]
      properties:
        user:
          $ref: "#/components/schemas/AuthUser"
        expires_at:
          type: string
          format: date-time
        csrf_token:
          type: string
          description: Also set as the `qualora_csrf` cookie for browser clients.
        setup_status:
          type: string
          example: completed
    MeResponse:
      type: object
      required: [authenticated]
      properties:
        authenticated:
          type: boolean
        user:
          $ref: "#/components/schemas/AuthUser"
        expires_at:
          type: string
          format: date-time
    CreateProjectRequest:
      type: object
      additionalProperties: false
      description: At least one of frontend_url, api_base_url, or openapi_url is required.
      required:
        - name
        - allowed_hosts
      properties:
        name:
          type: string
        frontend_url:
          type: string
          default: ""
        api_base_url:
          type: string
          default: ""
        openapi_url:
          type: string
          default: ""
        allowed_hosts:
          type: array
          minItems: 1
          items:
            type: string
        security_mode:
          type: string
          enum: [passive]
          default: passive
        destructive_actions:
          type: boolean
          default: false
          description: Destructive actions are off by default and are not used by safe API smoke or safe test plan execution in this alpha.
        allow_private_targets:
          type: boolean
          default: false
    Project:
      type: object
      required:
        - id
        - name
        - frontend_url
        - api_base_url
        - openapi_url
        - allowed_hosts
        - security_mode
        - destructive_actions
        - allow_private_targets
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        frontend_url:
          type: string
        api_base_url:
          type: string
        openapi_url:
          type: string
        allowed_hosts:
          type: array
          items:
            type: string
        security_mode:
          type: string
          enum: [passive]
        destructive_actions:
          type: boolean
        allow_private_targets:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ProjectSetupRequest:
      type: object
      additionalProperties: false
      required: [project]
      properties:
        project:
          $ref: "#/components/schemas/CreateProjectRequest"
        ai:
          $ref: "#/components/schemas/ProjectSetupAIConfig"
        credential:
          $ref: "#/components/schemas/ProjectSetupCredentialConfig"
        api_spec:
          $ref: "#/components/schemas/ProjectSetupAPISpecConfig"
        workflow:
          $ref: "#/components/schemas/ProjectSetupWorkflowSelection"
    ProjectSetupAIConfig:
      type: object
      additionalProperties: false
      properties:
        mode:
          type: string
          enum: [skip, existing, create, demo]
          default: skip
        provider_id:
          type: string
          format: uuid
          description: Required when mode is existing.
        provider:
          $ref: "#/components/schemas/AIProviderRequest"
    ProjectSetupCredentialConfig:
      type: object
      additionalProperties: false
      properties:
        mode:
          type: string
          enum: [skip, create]
          default: skip
        profile:
          $ref: "#/components/schemas/CredentialProfileRequest"
    ProjectSetupAPISpecConfig:
      type: object
      additionalProperties: false
      properties:
        mode:
          type: string
          enum: [skip, import, demo]
          default: skip
        spec:
          $ref: "#/components/schemas/APISpecImportRequest"
    ProjectSetupWorkflowSelection:
      type: object
      additionalProperties: false
      properties:
        browser_smoke:
          type: boolean
          default: false
        discovery:
          type: boolean
          default: false
        quality_checks:
          type: boolean
          default: false
        safe_qa_run:
          type: boolean
          description: Requires an AI provider because Safe QA generates a reviewable plan first.
        execute_safe_qa:
          type: boolean
          default: false
          description: When true, executes only the approved deterministic safe DSL subset after preview generation.
        api_smoke:
          type: boolean
          description: Requires an imported parsed OpenAPI spec.
        authenticated_smoke:
          type: boolean
          description: Requires a credential profile.
        use_defaults:
          type: boolean
          description: If true, Qualora chooses safe defaults from configured resources.
    ProjectSetupResponse:
      type: object
      required: [project, started, skipped, timeline, next_links]
      properties:
        project:
          $ref: "#/components/schemas/Project"
        ai_provider:
          $ref: "#/components/schemas/AIProvider"
        credential_profile:
          $ref: "#/components/schemas/CredentialProfile"
