services:
  qualora-api:
    build:
      context: .
      dockerfile: apps/control-plane/Dockerfile
    container_name: qualora-api
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://${POSTGRES_USER:-qualora}:${POSTGRES_PASSWORD:-qualora}@postgres:5432/${POSTGRES_DB:-qualora}?sslmode=disable
      REDIS_ADDR: redis:6379
      BROWSER_RUN_QUEUE: qualora:browser-runs
      API_RUN_QUEUE: qualora:api-runs
      TEST_PLAN_EXECUTION_QUEUE: ${TEST_PLAN_EXECUTION_QUEUE:-qualora:test-plan-executions}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: ${S3_BUCKET:-qualora-evidence}
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-qualora}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-qualora-dev-secret}
      S3_FORCE_PATH_STYLE: "true"
      EVIDENCE_DIR: /var/lib/qualora/evidence
      QUALORA_ENCRYPTION_KEY: ${QUALORA_ENCRYPTION_KEY:-qualora-insecure-dev-key-change-me}
      CORS_ALLOWED_ORIGINS: http://localhost:${QUALORA_WEB_PORT:-3000}
    volumes:
      - qualora_evidence:/var/lib/qualora/evidence
    ports:
      - "${QUALORA_API_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  qualora-web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: qualora-web
    environment:
      PORT: "3000"
      QUALORA_API_BASE_URL: ${QUALORA_API_BASE_URL:-http://localhost:8080}
    ports:
      - "${QUALORA_WEB_PORT:-3000}:3000"
    depends_on:
      qualora-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  qualora-worker-browser:
    build:
      context: .
      dockerfile: workers/browser/Dockerfile
    container_name: qualora-worker-browser
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-qualora}:${POSTGRES_PASSWORD:-qualora}@postgres:5432/${POSTGRES_DB:-qualora}?sslmode=disable
      REDIS_URL: redis://redis:6379
      RUN_QUEUE: qualora:browser-runs
      TEST_PLAN_EXECUTION_QUEUE: ${TEST_PLAN_EXECUTION_QUEUE:-qualora:test-plan-executions}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: ${S3_BUCKET:-qualora-evidence}
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-qualora}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-qualora-dev-secret}
      S3_FORCE_PATH_STYLE: "true"
      EVIDENCE_DIR: /var/lib/qualora/evidence
    volumes:
      - qualora_evidence:/var/lib/qualora/evidence
    depends_on:
      qualora-api:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped

  qualora-worker-api:
    build:
      context: .
      dockerfile: workers/api/Dockerfile
    container_name: qualora-worker-api
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-qualora}:${POSTGRES_PASSWORD:-qualora}@postgres:5432/${POSTGRES_DB:-qualora}?sslmode=disable
      REDIS_URL: redis://redis:6379
      API_RUN_QUEUE: qualora:api-runs
      API_REQUEST_TIMEOUT_MS: "10000"
      MAX_OPENAPI_ENDPOINTS: "25"
    depends_on:
      qualora-api:
        condition: service_healthy
    restart: unless-stopped

  mock-api:
    build:
      context: .
      dockerfile: scripts/mock-api/Dockerfile
    container_name: qualora-mock-api
    profiles: ["smoke"]
    ports:
      - "${MOCK_API_PORT:-18081}:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  demo-api:
    build:
      context: .
      dockerfile: scripts/demo-api/Dockerfile
    container_name: qualora-demo-api
    profiles: ["smoke"]
    ports:
      - "${DEMO_API_PORT:-18084}:8080"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  demo-web:
    build:
      context: .
      dockerfile: scripts/demo-web/Dockerfile
    container_name: qualora-demo-web
    profiles: ["smoke"]
    ports:
      - "${DEMO_WEB_PORT:-18082}:8080"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  fake-llm:
    build:
      context: .
      dockerfile: scripts/fake-llm/Dockerfile
    container_name: qualora-fake-llm
    profiles: ["smoke"]
    ports:
      - "${FAKE_LLM_PORT:-18083}:8080"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: qualora-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-qualora}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-qualora}
      POSTGRES_DB: ${POSTGRES_DB:-qualora}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: qualora-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: qualora-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-qualora}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-qualora-dev-secret}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  qualora_evidence:
