openapi: 3.0.3
info:
  title: Qualora Demo API
  version: 2.0.0
servers:
  - url: http://demo-api:8080
paths:
  /public/health:
    get:
      operationId: getPublicHealth
      summary: Public health check
      tags: [system]
      responses:
        "200":
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                required: [status, visibility]
                properties:
                  status:
                    type: string
                    enum: [ok]
                  visibility:
                    type: string
                    enum: [public]
  /health:
    get:
      operationId: getHealth
      summary: Legacy health check
      tags: [system]
      responses:
        "200":
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
  /status:
    get:
      operationId: getStatus
      summary: Service status
      tags: [system]
      responses:
        "200":
          description: API status
          content:
            application/json:
              schema:
                type: object
                required: [service, ready, mode]
                properties:
                  service:
                    type: string
                  ready:
                    type: boolean
                  mode:
                    type: string
  /users:
    get:
      operationId: listUsers
      summary: List demo users
      tags: [users]
      responses:
        "200":
          description: Demo users
          content:
            application/json:
              schema:
                type: object
                required: [users]
                properties:
                  users:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      summary: Create a user
      tags: [users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/User"
      responses:
        "201":
          description: Created user
  /users/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          example: "1"
    get:
      operationId: getUser
      summary: Get a demo user
      tags: [users]
      responses:
        "200":
          description: Demo user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                type: object
                required: [error]
                properties:
                  error:
                    type: string
    delete:
      operationId: deleteUser
      summary: Delete a user
      tags: [users]
      responses:
        "204":
          description: Deleted user
  /broken:
    get:
      operationId: getBroken
      summary: Deterministic broken endpoint
      tags: [system]
      responses:
        "200":
          description: Expected success response
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
  /profile:
    get:
      operationId: getLegacyProfile
      summary: Legacy unauthenticated profile placeholder
      tags: [users]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "401":
          description: Authentication required
  /private/profile:
    get:
      operationId: getPrivateProfile
      summary: Authenticated profile
      tags: [private]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "401":
          description: Authentication required
  /private/orders:
    get:
      operationId: listPrivateOrders
      summary: Authenticated orders
      tags: [private]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Orders
          content:
            application/json:
              schema:
                type: object
                required: [orders]
                properties:
                  orders:
                    type: array
                    items:
                      $ref: "#/components/schemas/Order"
        "401":
          description: Authentication required
  /private/broken-contract:
    get:
      operationId: getBrokenContract
      summary: Authenticated endpoint with intentional schema mismatch
      tags: [private]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Broken profile contract
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "401":
          description: Authentication required
  /private/server-error:
    get:
      operationId: getPrivateServerError
      summary: Authenticated deterministic server error
      tags: [private]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Expected success response
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
        "401":
          description: Authentication required
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    User:
      type: object
      required: [id, name, role]
      properties:
        id:
          type: string
        name:
          type: string
        role:
          type: string
    Profile:
      type: object
      required: [id, email, role]
      properties:
        id:
          type: string
        email:
          type: string
        role:
          type: string
    Order:
      type: object
      required: [id, status, total]
      properties:
        id:
          type: string
        status:
          type: string
        total:
          type: number
