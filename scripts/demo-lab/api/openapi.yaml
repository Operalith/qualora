openapi: 3.0.3
info:
  title: Qualora Demo Lab API
  version: 1.0.0
  description: Deterministic local-only API fixtures for safe Qualora demonstrations.
servers:
  - url: http://demo-lab-api:8080
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque-demo-token
  schemas:
    Health:
      type: object
      required: [status, visibility]
      properties:
        status: { type: string, enum: [ok] }
        visibility: { type: string, enum: [public] }
    CatalogItem:
      type: object
      required: [id, name, category, price]
      properties:
        id: { type: string }
        name: { type: string }
        category: { type: string }
        price: { type: number }
    Profile:
      type: object
      required: [id, email, role]
      properties:
        id: { type: string }
        email: { type: string, format: email }
        role: { type: string }
    Order:
      type: object
      required: [id, status, total]
      properties:
        id: { type: string }
        status: { type: string }
        total: { type: number }
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error: { type: string }
        message: { type: string }
    LegacyUser:
      type: object
      required: [id, name, role]
      properties:
        id: { type: string }
        name: { type: string }
        role: { type: string }
paths:
  /public/health:
    get:
      operationId: getPublicHealth
      summary: Public health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Health" }
  /public/catalog:
    get:
      operationId: getPublicCatalog
      summary: List the public catalog
      responses:
        "200":
          description: Catalog
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/CatalogItem" }
    post:
      operationId: createCatalogItem
      summary: Mutating fixture that Qualora must skip
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CatalogItem" }
      responses:
        "405": { description: Mutations are disabled }
  /public/status:
    get:
      operationId: getPublicStatus
      summary: Public service status
      responses:
        "200":
          description: Ready status
          content:
            application/json:
              schema:
                type: object
                required: [service, ready, mode]
                properties:
                  service: { type: string }
                  ready: { type: boolean }
                  mode: { type: string, enum: [baseline, regressed] }
  /public/search:
    get:
      operationId: searchPublicCatalog
      summary: Required query fixture without a safe example
      parameters:
        - in: query
          name: q
          required: true
          schema: { type: string }
      responses:
        "200": { description: Search results }
        "400":
          description: Missing query
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
  /status:
    get:
      operationId: getLegacyStatus
      summary: Compatibility status fixture
      responses:
        "200": { description: Ready status }
  /users:
    get:
      operationId: listLegacyUsers
      summary: Compatibility user list fixture
      responses:
        "200": { description: User list }
    post:
      operationId: createLegacyUser
      summary: Mutating fixture that Qualora must skip
      responses:
        "405": { description: Mutations are disabled }
  /users/{id}:
    get:
      operationId: getLegacyUser
      summary: Safe path parameter fixture
      parameters:
        - in: path
          name: id
          required: true
          example: "1"
          schema: { type: string }
      responses:
        "200":
          description: User
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LegacyUser" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
    delete:
      operationId: deleteLegacyUser
      summary: Destructive fixture that Qualora must skip
      responses:
        "405": { description: Mutations are disabled }
  /broken:
    get:
      operationId: getDeterministicFailure
      summary: Intentional public server error
      responses:
        "200": { description: Intentionally incorrect documented status }
        "500":
          description: Deterministic failure
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
  /profile:
    get:
      operationId: getLegacyProtectedProfile
      summary: Auth-required compatibility fixture
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Profile" }
        "401":
          description: Authentication required
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
  /private/profile:
    get:
      operationId: getPrivateProfile
      summary: Authenticated profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Profile" }
        "401":
          description: Authentication required
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
    patch:
      operationId: updatePrivateProfile
      summary: Mutating fixture that Qualora must skip
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Profile" }
      responses:
        "405": { description: Mutations are disabled }
  /private/orders:
    get:
      operationId: listPrivateOrders
      summary: Authenticated order list
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Orders
          content:
            application/json:
              schema:
                type: object
                required: [orders]
                properties:
                  orders:
                    type: array
                    items: { $ref: "#/components/schemas/Order" }
        "401": { description: Authentication required }
    put:
      operationId: replacePrivateOrders
      summary: Mutating fixture that Qualora must skip
      security:
        - bearerAuth: []
      responses:
        "405": { description: Mutations are disabled }
  /private/orders/{id}:
    get:
      operationId: getPrivateOrder
      summary: Authenticated order detail
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          example: ord-1
          schema: { type: string }
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Order" }
        "401": { description: Authentication required }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
  /private/broken-contract:
    get:
      operationId: getBrokenContract
      summary: Intentional required-field contract mismatch
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Intentionally incomplete profile response
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Profile" }
        "401": { description: Authentication required }
  /private/server-error:
    get:
      operationId: getPrivateServerError
      summary: Intentional authenticated server error
      security:
        - bearerAuth: []
      responses:
        "200": { description: Intentionally incorrect documented status }
        "401": { description: Authentication required }
        "500":
          description: Intentional error
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
